function Header({ onToggleSidebar, onLogout }) {
  const { user, theme, setTheme, currentPage, navigate: navTo, matters, addToast, setSelectedMatter } = useContext(AppContext);
  const [showNotif, setShowNotif] = useState(false);
  const [showUserMenu, setShowUserMenu] = useState(false);
  const [notifications, setNotifications] = useState(() => {
    // Generate dynamic notifications based on matters
    const notifs = [];
    const today = new Date().toISOString().split('T')[0];
    return notifs;
  });
  const notifRef = useRef(null);
  const userMenuRef = useRef(null);
  const [dismissedNotifs, setDismissedNotifs] = useState(() => LS.get('dismissedNotifs', []));

  // Build live notifications from matters data
  const liveNotifications = useMemo(() => {
    const notifs = [];
    const now = new Date();
    const today = now.toISOString().split('T')[0];
    const tomorrow = new Date(now); tomorrow.setDate(now.getDate() + 1);
    const tomorrowStr = tomorrow.toISOString().split('T')[0];

    // Today's hearings
    const todayHearings = matters.filter(m => m.nextHearing === today && m.status === 'PENDING');
    todayHearings.forEach(m => {
      notifs.push({ id: 'h-' + m.id, type: 'hearing', icon: 'calendar', title: 'Hearing Today', desc: `${m.caseType} ${m.caseNo}/${m.year} — ${m.title}`, time: 'Today', unread: true, matterId: m.id, action: () => { navTo('matterdetail'); } });
    });

    // Tomorrow's hearings
    const tomorrowHearings = matters.filter(m => m.nextHearing === tomorrowStr && m.status === 'PENDING');
    tomorrowHearings.forEach(m => {
      notifs.push({ id: 'th-' + m.id, type: 'info', icon: 'clock', title: 'Hearing Tomorrow', desc: `${m.caseType} ${m.caseNo}/${m.year} — ${m.title}`, time: 'Tomorrow', unread: true });
    });

    // Defective cases (only open defects)
    const defective = matters.filter(m => m.defects && m.defects.some(d => d.status === 'open'));
    defective.forEach(m => {
      const openDefects = m.defects.filter(d => d.status === 'open');
      notifs.push({ id: 'd-' + m.id, type: 'warning', icon: 'alertTriangle', title: 'Defect Alert', desc: `${m.caseType} ${m.caseNo}/${m.year} has ${openDefects.length} open defect(s) to fix`, time: 'Action needed', unread: true, matterId: m.id, action: () => { navTo('matterdetail'); } });
    });

    // Priority cases reminder
    const priority = matters.filter(m => m.onPriority);
    if (priority.length > 0) {
      notifs.push({ id: 'pr-all', type: 'danger', icon: 'star', title: 'Priority Cases', desc: `You have ${priority.length} case(s) marked as priority — review pending actions`, time: 'Ongoing', unread: false });
    }

    // Court status
    notifs.push({ id: 'court-status', type: 'success', icon: 'checkCircle', title: 'Court Portal Online', desc: 'Allahabad High Court systems are operational. Live court view available.', time: 'Just now', unread: false });

    // Welcome notification
    notifs.push({ id: 'welcome', type: 'info', icon: 'scales', title: 'Welcome to LegalDesk', desc: 'Your smart legal case management platform is ready. Explore the dashboard for live court updates.', time: 'System', unread: false });

    return notifs;
  }, [matters, navTo]);

  // Apply dismissed state
  const processedNotifications = useMemo(() =>
    liveNotifications.map(n => dismissedNotifs.includes(n.id) ? { ...n, unread: false } : n),
    [liveNotifications, dismissedNotifs]
  );
  const unreadCount = processedNotifications.filter(n => n.unread).length;

  const iconForNotif = (iconName) => {
    const map = { calendar: Icons.calendar, clock: Icons.clock, alertTriangle: Icons.alertTriangle, star: Icons.star, checkCircle: Icons.checkCircle, scales: Icons.scales, bell: Icons.bell };
    return map[iconName] || Icons.bell;
  };

  // Close dropdowns on outside click
  useEffect(() => {
    const handler = (e) => {
      if (notifRef.current && !notifRef.current.contains(e.target)) setShowNotif(false);
      if (userMenuRef.current && !userMenuRef.current.contains(e.target)) setShowUserMenu(false);
    };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);

  const pageNames = {
    dashboard: 'Dashboard', matters: 'Matters', causelist: 'Causelist', displayboard: 'Display Board',
    courtconnect: 'Court Connect',
    districtcourts: 'District Courts',
    legalupdates: 'Legal Updates', firtracker: 'FIR Tracker', appealtracker: 'Appeal Tracker',
    caveattracker: 'Caveat Tracker', tasks: 'Tasks', reports: 'Reports', invoices: 'Invoices',
    courtlinks: 'Court Resources', settings: 'Account Settings', matterdetail: 'Matter Detail',
    causetemplates: 'Cause List Templates',
  };

  const handleMarkAllRead = () => {
    const ids = liveNotifications.filter(n => n.unread).map(n => n.id);
    const newDismissed = [...new Set([...dismissedNotifs, ...ids])];
    setDismissedNotifs(newDismissed);
    LS.set('dismissedNotifs', newDismissed);
    addToast('All notifications marked as read', 'success');
  };

  return (
    <header className="header">
      <div className="header-left">
        <button className="hamburger" onClick={onToggleSidebar}>{Icons.menu}</button>
        <h1 className="header-title">{pageNames[currentPage] || 'Dashboard'}</h1>
      </div>
      <div className="header-right">
        <div className="court-status-indicator" onClick={() => navTo('courtconnect')} title="Open Court Connect">
          <span className="status-dot" />
          {Icons.courtConnect}
          <span>Court Portal: Available</span>
        </div>
        <div className="header-search">
          {Icons.search}
          <input placeholder="Search cases..." onKeyDown={e => { if (e.key === 'Enter' && e.target.value.trim()) { navTo('matters'); } }} />
        </div>
        <button className="theme-toggle" onClick={() => setTheme(theme === 'dark' ? 'light' : 'dark')} title="Toggle theme">
          {theme === 'dark' ? Icons.sun : Icons.moon}
        </button>

        {/* Notification Bell */}
        <div ref={notifRef} style={{position:'relative'}}>
          <button className="notification-btn" onClick={() => { setShowNotif(!showNotif); setShowUserMenu(false); }}>
            {Icons.bell}
            {unreadCount > 0 && <span className="notification-dot" />}
          </button>
          {showNotif && (
            <div className="notification-panel">
              <div className="notif-header">
                <h3>Notifications</h3>
                {unreadCount > 0 && <span className="notif-count">{unreadCount} new</span>}
              </div>
              <div className="notif-list">
                {processedNotifications.length === 0 ? (
                  <div className="notif-empty">{Icons.bell}<br/>No notifications yet</div>
                ) : processedNotifications.map(n => (
                  <div key={n.id} className={`notif-item ${n.unread ? 'unread' : ''}`} onClick={() => { if (n.matterId) { const found = matters.find(mm => mm.id === n.matterId); if (found) setSelectedMatter(found); } if (n.action) n.action(); setShowNotif(false); }}>
                    <div className={`notif-icon ${n.type}`}>{iconForNotif(n.icon)}</div>
                    <div className="notif-body">
                      <div className="notif-title">{n.title}</div>
                      <div className="notif-desc">{n.desc}</div>
                      <div className="notif-time">{n.time}</div>
                    </div>
                  </div>
                ))}
              </div>
              {processedNotifications.length > 0 && (
                <div className="notif-footer">
                  <button onClick={handleMarkAllRead} disabled={unreadCount === 0}>
                    {unreadCount === 0 ? 'All caught up' : 'Mark all as read'}
                  </button>
                </div>
              )}
            </div>
          )}
        </div>

        {/* User Menu with Dropdown */}
        <div className="user-menu" ref={userMenuRef} onClick={() => { setShowUserMenu(!showUserMenu); setShowNotif(false); }}>
          {user?.photoURL ? (
            <img src={user.photoURL} alt="" style={{width:34, height:34, borderRadius:'50%', objectFit:'cover'}} referrerPolicy="no-referrer" />
          ) : (
            <div className="user-avatar">{user?.initials || 'AD'}</div>
          )}
          <div className="user-info">
            <div className="name">{user?.name || 'Advocate'}</div>
            <div className="role">{user?.court?.split('(')[0]?.trim() || 'Court'}</div>
          </div>
          {Icons.chevronDown}
          {showUserMenu && (
            <div className="user-dropdown" onClick={e => e.stopPropagation()}>
              <div className="user-dropdown-header">
                <div className="dd-name">{user?.name || 'Advocate'}</div>
                {user?.email && <div className="dd-email">{user.email}</div>}
                {user?.barCouncil && <div className="dd-bar">Bar Council: {user.barCouncil}</div>}
                {user?.verified && <div className="verified-badge">{Icons.checkCircle} Verified Advocate</div>}
              </div>
              <div className="user-dropdown-item" onClick={() => { navTo('settings'); setShowUserMenu(false); }}>
                {Icons.user} My Profile
              </div>
              <div className="user-dropdown-item" onClick={() => { navTo('settings'); setShowUserMenu(false); }}>
                {Icons.settings} Settings
              </div>
              <div className="user-dropdown-item" onClick={() => { navTo('courtlinks'); setShowUserMenu(false); }}>
                {Icons.globe} Court Resources
              </div>
              <div className="user-dropdown-divider" />
              <div className="user-dropdown-item danger" onClick={() => { if (onLogout) onLogout(); setShowUserMenu(false); }}>
                {Icons.logOut} Sign Out
              </div>
            </div>
          )}
        </div>
      </div>
    </header>
  );
}

    { date: '2026-10-02', name: 'Mahatma Gandhi Jayanti', nameHi: 'महात्मा गांधी जयंती' },
    { date: '2026-10-20', name: 'Dussehra', nameHi: 'दशहरा' },
    { date: '2026-11-08', name: 'Diwali (Lakshmi Puja)', nameHi: 'दिवाली' },
    { date: '2026-11-10', name: 'Govardhan Puja', nameHi: 'गोवर्धन पूजा' },
    { date: '2026-11-12', name: 'Guru Nanak Jayanti', nameHi: 'गुरु नानक जयंती' },
    { date: '2026-12-25', name: 'Christmas Day', nameHi: 'क्रिसमस' },
  ];
  const COURT_VACATIONS_2026 = [
    { start: '2026-05-25', end: '2026-07-05', name: 'Summer Vacation', nameHi: 'ग्रीष्मकालीन अवकाश' },
    { start: '2026-10-05', end: '2026-10-19', name: 'Dussehra Vacation', nameHi: 'दशहरा अवकाश' },
    { start: '2026-12-26', end: '2027-01-04', name: 'Winter Vacation', nameHi: 'शीतकालीन अवकाश' },
  ];

  const todayDate = new Date(today);
  const upcomingHolidays = COURT_HOLIDAYS_2026.filter(h => new Date(h.date) >= todayDate).slice(0, 4);
  const currentVacation = COURT_VACATIONS_2026.find(v => todayDate >= new Date(v.start) && todayDate <= new Date(v.end));
  const nextVacation = COURT_VACATIONS_2026.find(v => new Date(v.start) > todayDate);
  const isWeekend = todayDate.getDay() === 0 || todayDate.getDay() === 6;
  const isHoliday = COURT_HOLIDAYS_2026.some(h => h.date === today);
  const isCourtWorking = !isWeekend && !isHoliday && !currentVacation;

  // Live panel URLs
  const LIVE_PANELS = {
    courtview: {
      label: 'Court View', labelHi: 'कोर्ट व्यू', icon: Icons.monitor,
      urlAld: 'https://courtview2.allahabadhighcourt.in/courtview/CourtViewAllahabad.do',
      urlLko: 'https://courtview2.allahabadhighcourt.in/courtview/CourtViewLucknow.do',
      desc: 'Live display of cases being heard right now',
    },
    justiceclock: {
      label: 'Justice Clock', labelHi: 'न्याय घड़ी', icon: Icons.clock,
      urlAld: 'https://www.allahabadhighcourt.in/jclock.html',
      urlLko: 'https://www.allahabadhighcourt.in/jclock.html',
      desc: 'Real-time disposal & institution stats',
    },
    benchroster: {
      label: 'Bench Roster', labelHi: 'पीठ रोस्टर', icon: Icons.gavel,
      urlAld: 'https://www.allahabadhighcourt.in/calendar/itemWiseList.jsp?group=11',
      urlLko: 'https://www.allahabadhighcourt.in/calendar/itemWiseList.jsp?group=11',
      desc: 'Which bench hears which case type today',
    },
    causelists: {
      label: 'Cause Lists', labelHi: 'वाद सूची', icon: Icons.fileText,
      urlAld: 'https://www.allahabadhighcourt.in/causelist/causelist_ald.htm',
      urlLko: 'https://www.allahabadhighcourt.in/causelist/causelist_lko.htm',
      desc: "Today's cause list — cases scheduled for hearing",
    },
    efiling: {
      label: 'eFiling', labelHi: 'ई-फाइलिंग', icon: Icons.fileText,
      urlAld: 'https://www.allahabadhighcourt.in/efiling_21042021_landing.html',
      urlLko: 'https://www.allahabadhighcourt.in/efiling_21042021_landing.html',
      desc: 'File new cases or documents electronically',
    },
    defective: {
      label: 'Defective List', labelHi: 'दोषपूर्ण सूची', icon: Icons.alertTriangle,
      urlAld: 'https://www.allahabadhighcourt.in/calendar/cleardefectivelist.jsp',
      urlLko: 'https://www.allahabadhighcourt.in/calendar/cleardefectivelist.jsp',
      desc: 'Official list of defective case filings to clear',
    },
  };

  const currentPanel = LIVE_PANELS[livePanel];
  const currentUrl = liveBench === 'lucknow' ? currentPanel.urlLko : currentPanel.urlAld;

  const refreshIframe = () => setIframeKey(k => k + 1);

  const groupedByDate = {};
  const casesToShow = tab === 'confirmed' ? pending.filter(m => m.nextHearing) : pending.filter(m => !m.nextHearing);
  casesToShow.forEach(m => {
    const key = m.nextHearing || 'Unscheduled';
    if (!groupedByDate[key]) groupedByDate[key] = [];
    groupedByDate[key].push(m);
  });

  const toggleGroup = (key) => setExpanded(prev => ({...prev, [key]: !prev[key]}));
  const viewMatter = (m) => { setSelectedMatter(m); navigate('matterdetail'); };

  return (
    <div className="content">
      <div className="page-header">
        <h2 className="page-title">Dashboard</h2>
        <div style={{display:'flex', alignItems:'center', gap:12}}>
          <div style={{
            display:'inline-flex', alignItems:'center', gap:6, padding:'4px 12px',
            borderRadius:'var(--radius-full)', fontSize:12, fontWeight:700, letterSpacing:'0.3px',
            background: isCourtWorking ? 'var(--success-bg)' : 'var(--danger-bg)',
            color: isCourtWorking ? 'var(--success)' : 'var(--danger)',
            border: `1px solid ${isCourtWorking ? 'var(--success)' : 'var(--danger)'}20`,
          }}>
            <span style={{width:7, height:7, borderRadius:'50%', background: isCourtWorking ? 'var(--success)' : 'var(--danger)', display:'inline-block', animation: isCourtWorking ? 'pulse 2s infinite' : 'none'}} />
            {isCourtWorking ? 'COURT IN SESSION' : currentVacation ? 'VACATION' : isHoliday ? 'HOLIDAY' : 'WEEKEND'}
          </div>
          <div style={{
            display:'inline-flex', alignItems:'center', gap:6, padding:'4px 12px',
            borderRadius:'var(--radius-full)', fontSize:11, fontWeight:600,
            background: backendOnline ? '#ECFDF5' : '#FEF3C7',
            color: backendOnline ? '#059669' : '#D97706',
            border: `1px solid ${backendOnline ? '#05966920' : '#D9770620'}`,
          }}>
            <span style={{width:6, height:6, borderRadius:'50%', background: backendOnline ? '#059669' : '#D97706', display:'inline-block'}} />
            {loadingLiveCases ? 'Fetching live cases...' : backendOnline ? 'LIVE DATA' : 'DEMO DATA'}
          </div>
          <div style={{fontSize:13, color:'var(--text-secondary)'}}>
            {Icons.calendar} <span style={{marginLeft:4}}>{fmtDateLong(today)}</span>
          </div>
        </div>
      </div>

      {/* Live ETA Banner */}
      <LiveETABanner />

      {/* Stats Row */}
      <div className="stats-grid">
        <div className="stat-card" style={{cursor:'pointer'}} onClick={()=>navigate('matters')}>
          <div className="stat-icon" style={{background:'var(--primary-bg)', color:'var(--primary)'}}>{Icons.briefcase}</div>
          <div className="stat-content">
            <div className="stat-value">{matters.length}</div>
            <div className="stat-label">Total Matters</div>
            <div className="stat-change up">{Icons.arrowUp} {priorityCases.length} priority</div>
          </div>
        </div>
        <div className="stat-card" style={{cursor:'pointer'}} onClick={()=>navigate('matters')}>
          <div className="stat-icon" style={{background:'var(--warning-bg)', color:'var(--warning)'}}>{Icons.clock}</div>
          <div className="stat-content">
            <div className="stat-value">{pending.length}</div>
            <div className="stat-label">Pending Cases</div>
          </div>
        </div>
        <div className="stat-card">
          <div className="stat-icon" style={{background:'var(--danger-bg)', color:'var(--danger)'}}>{Icons.calendar}</div>
          <div className="stat-content">
            <div className="stat-value">{todayHearings.length}</div>
            <div className="stat-label">Today's Hearings</div>
          </div>
        </div>
        <div className="stat-card">
          <div className="stat-icon" style={{background: defectiveCases.length > 0 ? 'var(--danger-bg)' : 'var(--success-bg)', color: defectiveCases.length > 0 ? 'var(--danger)' : 'var(--success)'}}>{defectiveCases.length > 0 ? Icons.alertTriangle : Icons.checkCircle}</div>
          <div className="stat-content">
            <div className="stat-value">{defectiveCases.length}</div>
            <div className="stat-label">Defective Cases</div>
            {defectiveCases.length > 0 && <div className="stat-change down" style={{color:'var(--danger)'}}>{Icons.alertTriangle} Needs attention</div>}
          </div>
        </div>
      </div>

      {/* ─── LIVE COURT HUB ─── */}
      <div className="card mb-16" style={{overflow:'hidden'}}>
        <div className="card-header" style={{background:'linear-gradient(135deg, var(--primary) 0%, #6366F1 100%)', color:'#fff', padding:'14px 20px'}}>
          <span className="card-title" style={{color:'#fff', display:'flex', alignItems:'center', gap:8}}>
            {Icons.monitor}
            <span>Live Court Hub</span>
            <span style={{fontSize:9, background:'rgba(255,255,255,0.25)', padding:'2px 8px', borderRadius:'var(--radius-full)', fontWeight:700, letterSpacing:'0.5px', marginLeft:4}}>LIVE</span>
          </span>
          <div style={{display:'flex', alignItems:'center', gap:8}}>
            {/* Bench Toggle */}
            <div style={{display:'flex', borderRadius:'var(--radius)', overflow:'hidden', border:'1px solid rgba(255,255,255,0.3)'}}>
              <button onClick={()=>{setLiveBench('allahabad');setIframeKey(k=>k+1);}} style={{
                padding:'4px 12px', fontSize:11, fontWeight:600, border:'none', cursor:'pointer',
                background: liveBench==='allahabad' ? 'rgba(255,255,255,0.95)' : 'transparent',
                color: liveBench==='allahabad' ? 'var(--primary)' : 'rgba(255,255,255,0.8)',
              }}>Allahabad</button>
              <button onClick={()=>{setLiveBench('lucknow');setIframeKey(k=>k+1);}} style={{
                padding:'4px 12px', fontSize:11, fontWeight:600, border:'none', cursor:'pointer',
                background: liveBench==='lucknow' ? 'rgba(255,255,255,0.95)' : 'transparent',
                color: liveBench==='lucknow' ? 'var(--primary)' : 'rgba(255,255,255,0.8)',
              }}>Lucknow</button>
            </div>
            <button className="btn btn-sm" style={{background:'rgba(255,255,255,0.2)', color:'#fff', border:'1px solid rgba(255,255,255,0.3)'}} onClick={refreshIframe}>{Icons.refresh} Refresh</button>
            <button className="btn btn-sm" style={{background:'rgba(255,255,255,0.2)', color:'#fff', border:'1px solid rgba(255,255,255,0.3)'}} onClick={() => openCourtPopup(currentUrl, 'LiveView')}>{Icons.externalLink} Pop Out</button>
          </div>
        </div>

        {/* Live Panel Tabs */}
        <div style={{display:'flex', overflowX:'auto', borderBottom:'1px solid var(--border)', background:'var(--bg-card)'}}>
          {Object.entries(LIVE_PANELS).map(([key, panel]) => (
            <button key={key} onClick={() => { setLivePanel(key); setIframeKey(k => k + 1); }} style={{
              flex:'none', display:'flex', alignItems:'center', gap:6, padding:'10px 16px', fontSize:12, fontWeight:600,
              border:'none', borderBottom: livePanel === key ? '2px solid var(--primary)' : '2px solid transparent',
              background: livePanel === key ? 'var(--primary-bg)' : 'transparent',
              color: livePanel === key ? 'var(--primary)' : 'var(--text-secondary)',
              cursor:'pointer', transition:'var(--transition)', whiteSpace:'nowrap',
            }}>
              {panel.icon} {panel.label}
            </button>
          ))}
        </div>

        {/* Embedded Live View */}
        <div style={{position:'relative', background:'var(--bg-elevated)'}}>
          <div style={{padding:'8px 16px', fontSize:11, color:'var(--text-muted)', display:'flex', justifyContent:'space-between', alignItems:'center', borderBottom:'1px solid var(--border)'}}>
            <span>{currentPanel.desc} — {liveBench === 'lucknow' ? 'Lucknow Bench' : 'Allahabad (Principal Seat)'}</span>
            <span style={{fontFamily:'monospace', fontSize:10, opacity:0.6}}>{currentUrl.replace('https://',''). split('/').slice(0,2).join('/')}</span>
          </div>
          <div style={{padding:'24px 20px', textAlign:'center', minHeight:200, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:16, background:'var(--bg-card)'}}>
            <div style={{width:64, height:64, borderRadius:'50%', background:'var(--primary-bg)', display:'flex', alignItems:'center', justifyContent:'center', color:'var(--primary)'}}>{currentPanel.icon}</div>
            <div>
              <div style={{fontWeight:700, fontSize:16, marginBottom:4}}>{currentPanel.label}</div>
              <div style={{fontSize:13, color:'var(--text-secondary)', maxWidth:400, margin:'0 auto'}}>{currentPanel.desc}</div>
            </div>
            <div style={{display:'flex', gap:8, flexWrap:'wrap', justifyContent:'center'}}>
              <button className="btn btn-primary" onClick={() => window.open(currentUrl, '_blank')}>{Icons.externalLink} Open {currentPanel.label}</button>
              <button className="btn btn-outline" onClick={() => openCourtPopup(currentUrl, currentPanel.label)}>{Icons.monitor} Open in Popup Window</button>
            </div>
            <div style={{fontSize:11, color:'var(--text-muted)', marginTop:8, maxWidth:450}}>
              Court websites restrict embedding for security. Click the button above to open the live {currentPanel.label.toLowerCase()} directly from the Allahabad High Court website.
            </div>
          </div>
        </div>
      </div>

      {/* ─── COURT CALENDAR STRIP ─── */}
      <div className="card mb-16">
        <div className="card-header">
          <span className="card-title" style={{display:'flex', alignItems:'center', gap:8}}>{Icons.calendar} Court Calendar 2026</span>
          <button className="btn btn-sm btn-ghost" onClick={() => openCourtPopup('https://www.allahabadhighcourt.in/Calendar/calendar.htm', 'CourtCalendar')}>{Icons.externalLink} Full Calendar</button>
        </div>
        <div className="card-body" style={{padding:'12px 20px'}}>
          {/* Vacation Alert */}
          {currentVacation && (
            <div style={{padding:'10px 14px', borderRadius:'var(--radius)', background:'var(--warning-bg)', border:'1px solid var(--warning)', marginBottom:12, fontSize:13}}>
              <strong style={{color:'var(--warning)'}}>Court on Vacation:</strong> {currentVacation.name} ({currentVacation.nameHi}) — {fmtDate(currentVacation.start)} to {fmtDate(currentVacation.end)}
            </div>
          )}
          {nextVacation && !currentVacation && (
            <div style={{padding:'10px 14px', borderRadius:'var(--radius)', background:'var(--info-bg)', border:'1px solid var(--info)', marginBottom:12, fontSize:13}}>
              <strong style={{color:'var(--info)'}}>Next Vacation:</strong> {nextVacation.name} ({nextVacation.nameHi}) — starts {fmtDate(nextVacation.start)}
              {(() => { const d = Math.ceil((new Date(nextVacation.start) - todayDate)/(1000*60*60*24)); return ` (${d} day${d>1?'s':''} away)`; })()}
            </div>
          )}
          {/* Upcoming Holidays */}
          <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(200px, 1fr))', gap:8}}>
            {upcomingHolidays.map((h, i) => {
              const daysAway = Math.ceil((new Date(h.date) - todayDate) / (1000*60*60*24));
              return (
                <div key={i} style={{display:'flex', alignItems:'center', gap:10, padding:'8px 12px', borderRadius:'var(--radius)', border:'1px solid var(--border)', background:'var(--bg-card)'}}>
                  <div style={{width:36, height:36, borderRadius:'var(--radius)', background:'var(--danger-bg)', color:'var(--danger)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:11, fontWeight:800, flexShrink:0}}>
                    {new Date(h.date).getDate()}
                  </div>
                  <div style={{minWidth:0}}>
                    <div style={{fontSize:12, fontWeight:600, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis'}}>{h.name}</div>
                    <div style={{fontSize:10, color:'var(--text-muted)'}}>{h.nameHi} — {daysAway === 0 ? 'Today' : daysAway + 'd away'}</div>
                  </div>
                </div>
              );
            })}
            {upcomingHolidays.length === 0 && <div style={{fontSize:12, color:'var(--text-muted)', padding:8}}>No upcoming holidays this year</div>}
          </div>
        </div>
      </div>

      {/* ─── MAIN DASHBOARD GRID ─── */}
      <div className="dashboard-grid">
        <div>
          {/* Listed Cases */}
          <div className="card">
            <div className="card-header">
              <span className="card-title">Listed Cases</span>
              <div className="tabs">
                <button className={`tab ${tab==='confirmed'?'active':''}`} onClick={()=>setTab('confirmed')}>Confirmed</button>
                <button className={`tab ${tab==='tentative'?'active':''}`} onClick={()=>setTab('tentative')}>Tentative</button>
              </div>
            </div>
            <div className="card-body">
              {Object.keys(groupedByDate).length === 0 ? (
                <div className="empty-state">
                  {Icons.calendar}
                  <h3>No cases listed</h3>
                  <p>No cases found for the selected filter</p>
                </div>
              ) : (
                Object.entries(groupedByDate).sort((a,b) => a[0].localeCompare(b[0])).map(([date, cases]) => {
                  const isExp = expanded[date] !== false;
                  const courtGroups = {};
                  cases.forEach(c => {
                    if (!courtGroups[c.court]) courtGroups[c.court] = [];
                    courtGroups[c.court].push(c);
                  });
                  return (
                    <div key={date} className="case-group">
                      <div className={`case-group-header ${isExp?'expanded':''}`} onClick={()=>toggleGroup(date)}>
                        {Icons.chevronRight}
                        <span>Hearing Date: {fmtDate(date)} &mdash; {cases.length} Case{cases.length>1?'s':''}</span>
                      </div>
                      {isExp && Object.entries(courtGroups).map(([court, cs]) => (
                        <div key={court} style={{marginLeft:20, marginBottom:12}}>
                          <div style={{fontSize:12, fontWeight:600, color:'var(--text-secondary)', marginBottom:8, display:'flex', alignItems:'center', gap:6}}>
                            {Icons.gavel} {court} ({cs.length})
                          </div>
                          {cs.map(c => (
                            <div key={c.id} className="case-card">
                              <div className="case-card-header">
                                <span className="case-card-title" onClick={()=>viewMatter(c)}>{c.title}</span>
                                <span className={`badge ${c.onPriority ? 'badge-urgent' : 'badge-pending'}`}>
                                  {c.onPriority ? 'PRIORITY' : c.status}
                                </span>
                              </div>
                              <div className="case-card-meta">
                                <span><strong>File:</strong> {c.fileNo}</span>
                                <span><strong>Case:</strong> {c.caseRef}</span>
                                <span><strong>Coram:</strong> {c.coram?.split(',')[0]}</span>
                              </div>
                              <div style={{marginTop:10, display:'flex', gap:8, flexWrap:'wrap'}}>
                                <button className="btn btn-sm btn-outline" onClick={()=>viewMatter(c)}>{Icons.eye} View</button>
                                <button className="btn btn-sm btn-ghost" onClick={()=>viewMatter(c)}>{Icons.note} Last Order</button>
                                <button className="wa-btn" onClick={() => window.open(buildWhatsAppUrl(c), '_blank')} title="Share on WhatsApp">{Icons.whatsapp} Share</button>
                                <button className="btn btn-sm btn-ghost" style={{color:'#128C7E'}} onClick={() => {
                                  const activeMembers = (teamMembers || []).filter(m => m.active !== false);
                                  if (activeMembers.length === 0) { addToast('No team members. Add in Settings.', 'error'); return; }
                                  const text = encodeURIComponent(`\u{1F4CB} *Case Update*\n${c.caseRef} - ${c.title}\nNext: ${c.nextHearing ? fmtDate(c.nextHearing) : 'N/A'}\n_via LegalDesk_`);
                                  activeMembers.forEach((member, i) => {
                                    setTimeout(() => window.open(`https://api.whatsapp.com/send?phone=${member.phone}&text=${text}`, '_blank'), i * 500);
                                  });
                                  addToast(`Notifying ${activeMembers.length} team member(s)`, 'success');
                                }} title="Notify team via WhatsApp">{Icons.users}</button>
                              </div>
                            </div>
                          ))}
                        </div>
                      ))}
                    </div>
                  );
                })
              )}
            </div>
          </div>
        </div>
        <div>
          {/* Legal Updates */}
          <div className="card">
            <div className="card-header">
              <span className="card-title">Legal Updates</span>
              <button className="btn btn-sm btn-ghost" onClick={()=>navigate('legalupdates')}>View All</button>
            </div>
            <div className="card-body" style={{padding:'8px 20px'}}>
              {LEGAL_NEWS.slice(0,4).map(n => (
                <div key={n.id} className="news-card">
                  <div className="news-thumb">{Icons.newspaper}</div>
                  <div className="news-content">
                    <div className="news-title">{n.title}</div>
                    <div className="news-time">{n.time}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>

          {/* Quick Actions */}
          <div className="card" style={{marginTop:16}}>
            <div className="card-header">
              <span className="card-title">Quick Actions</span>
            </div>
            <div className="card-body" style={{display:'flex', flexDirection:'column', gap:8}}>
              <button className="btn btn-primary btn-block" onClick={()=>navigate('matters')}>{Icons.plus} Create New Matter</button>
              <button className="btn btn-outline btn-block" onClick={()=>navigate('courtconnect')}>{Icons.courtConnect} Court Connect (CCMS)</button>
              <button className="btn btn-outline btn-block" onClick={()=>navigate('displayboard')}>{Icons.monitor} Full Display Board</button>
              <button className="btn btn-outline btn-block" onClick={()=>navigate('tasks')}>{Icons.tasks} Add New Task</button>
              <button className="btn btn-outline btn-block" onClick={()=>navigate('causelist')}>{Icons.receipt} Create Invoice</button>
              <button className="btn btn-block" style={{background:'#14B8A6', color:'#fff'}} onClick={() => {
                const rollNo = user?.rollNo;
                if (!rollNo) { addToast('Roll number not found. Please update your profile.', 'error'); return; }
                const isLucknow = user?.court?.includes('Lucknow');
                const base = isLucknow ? CCMS_BASE_LKO : CCMS_BASE_ALD;
                openCourtPopup(base + '/advocate-cases-roll-wise', 'FetchMyCases');
                addToast('Court portal opened - solve the CAPTCHA to view all your cases (Roll No: ' + rollNo + ')', 'info');
              }}>{Icons.courtConnect} Fetch My Cases</button>
            </div>
          </div>

          {/* Upcoming Hearings Mini */}
          <div className="card" style={{marginTop:16}}>
            <div className="card-header">
              <span className="card-title">This Week ({thisWeek.length})</span>
              <button className="btn btn-sm btn-ghost" onClick={()=>navigate('reports')}>{Icons.calendar} Calendar</button>
            </div>
            <div className="card-body" style={{padding:'8px 16px'}}>
              {thisWeek.length === 0 ? (
                <div style={{fontSize:12, color:'var(--text-muted)', padding:8, textAlign:'center'}}>No hearings this week</div>
              ) : thisWeek.slice(0, 5).map(m => (
                <div key={m.id} style={{display:'flex', alignItems:'center', gap:10, padding:'8px 0', borderBottom:'1px solid var(--border)', cursor:'pointer'}} onClick={() => viewMatter(m)}>
                  <div style={{width:32, height:32, borderRadius:'var(--radius)', background:'var(--primary-bg)', color:'var(--primary)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:11, fontWeight:800, flexShrink:0}}>
                    {new Date(m.nextHearing).getDate()}
                  </div>
                  <div style={{minWidth:0, flex:1}}>
                    <div style={{fontSize:12, fontWeight:600, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis'}}>{m.title.slice(0,40)}</div>
                    <div style={{fontSize:10, color:'var(--text-muted)'}}>{m.caseRef} — {m.coram?.split(',')[0]}</div>
                  </div>
                  {m.onPriority && <span className="badge badge-urgent" style={{fontSize:9}}>PRI</span>}
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// LIVE ETA BANNER
// ─────────────────────────────────────────────────────────────────────
function LiveETABanner({ singleMatter }) {
  const { matters, backendOnline } = useContext(AppContext);
  const [etaTab, setEtaTab] = useState('all');
  const [simTick, setSimTick] = useState(0);
  const [liveCourtData, setLiveCourtData] = useState(null);

  // Fetch real court view data every 30s if backend is online
  useEffect(() => {
    let cancelled = false;
    const fetchCourtView = async () => {
      if (!backendOnline) {
        setSimTick(t => t + 1); // fallback to simulated
        return;
      }
      try {
        const [ald, lko] = await Promise.allSettled([
          CourtAPI.getCourtView('allahabad'),
          CourtAPI.getCourtView('lucknow'),
        ]);
        if (cancelled) return;
        const courts = [
          ...(ald.status === 'fulfilled' && ald.value.courts ? ald.value.courts : []),
          ...(lko.status === 'fulfilled' && lko.value.courts ? lko.value.courts : []),
        ];
        if (courts.length > 0) {
          setLiveCourtData(courts);
        } else {
          setSimTick(t => t + 1);
        }
      } catch {
        setSimTick(t => t + 1);
      }
    };
    fetchCourtView();
    const iv = setInterval(fetchCourtView, 30000);
    return () => { cancelled = true; clearInterval(iv); };
  }, [backendOnline]);

  const today = toYMD(new Date());
  const todayMatters = singleMatter
    ? (singleMatter.nextHearing === today ? [singleMatter] : [])
    : matters.filter(m => m.status === 'PENDING' && m.nextHearing === today);

  if (todayMatters.length === 0) return null;

  const ETA_TABS = [
    { key: 'all', label: 'All' },
    { key: 'pa', label: 'PA' },
    { key: 'fresh', label: 'Fresh' },
    { key: 'additional', label: 'Additional' },
    { key: 'application', label: 'Application' },
    { key: 'timefixed', label: 'Time Fixed' },
  ];

  const isLive = !!(liveCourtData && liveCourtData.length > 0);
  const avgTimePerItem = 5; // minutes
  const mattersWithEta = todayMatters.map((m, idx) => {
    const userItemNo = m.itemNo || (idx + 1) * 3 + 5;
    // Use real court view data if available
    let currentItem;
    if (isLive) {
      // Try to match court from live data
      const courtMatch = liveCourtData.find(c => c.coram && m.coram && c.coram.includes(m.coram.split(',')[0]?.trim()));
      currentItem = courtMatch ? parseInt(courtMatch.currentItem) || 1 : 1 + Math.floor(idx * 2);
    } else {
      currentItem = Math.min(userItemNo, 1 + simTick + Math.floor(idx * 2)); // simulated progress
    }
    const itemsAway = Math.max(0, userItemNo - currentItem);
    const etaMins = itemsAway * avgTimePerItem;
    const courtRoom = m.coram ? 'Court ' + (idx + 1) : 'Court ' + (idx + 1);
    const clType = (m.causelistType || '').toLowerCase();
    let category = 'all';
    if (clType === 'fresh') category = 'fresh';
    else if (clType === 'supplementary' || clType === 'additional') category = 'additional';
    else if (clType === 'application') category = 'application';
    return { ...m, userItemNo, currentItem, itemsAway, etaMins, courtRoom, category };
  });

  const filteredMatters = etaTab === 'all' ? mattersWithEta : mattersWithEta.filter(m => m.category === etaTab);

  const getColor = (mins) => {
    if (mins <= 0) return { bg: '#ECFDF5', color: '#059669', label: 'NOW BEING HEARD' };
    if (mins <= 5) return { bg: '#FEF2F2', color: '#DC2626', label: '~' + mins + ' mins - START WALKING!' };
    if (mins <= 15) return { bg: '#FFF7ED', color: '#EA580C', label: '~' + mins + ' mins away' };
    return { bg: '#ECFEFF', color: '#0891B2', label: '~' + mins + ' mins away' };
  };

  return (
    <div style={{background:'var(--bg-card)', border:'1px solid var(--border)', borderRadius:'var(--radius-lg)', padding:16, marginBottom:20}}>
      <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:12, flexWrap:'wrap', gap:8}}>
        <div style={{display:'flex', alignItems:'center', gap:8}}>
          <span style={{width:8, height:8, borderRadius:'50%', background:'var(--danger)', display:'inline-block', animation:'pulse 1.5s infinite'}} />
          <span style={{fontWeight:700, fontSize:14}}>Live ETA Alerts</span>
          <span style={{fontSize:11, color:'var(--text-muted)'}}>Today's Hearings ({todayMatters.length})</span>
        </div>
        <div style={{display:'flex', gap:0, borderRadius:'var(--radius-full)', overflow:'hidden', border:'1px solid var(--border)'}}>
          {ETA_TABS.map(t => (
            <button key={t.key} style={{padding:'4px 10px', fontSize:11, fontWeight:600, border:'none', cursor:'pointer', background: etaTab===t.key ? 'var(--primary)' : 'transparent', color: etaTab===t.key ? '#fff' : 'var(--text-secondary)', fontFamily:'var(--font)'}} onClick={()=>setEtaTab(t.key)}>{t.label}</button>
          ))}
        </div>
      </div>
      <div style={{fontSize:11, color:'var(--text-muted)', marginBottom:8}}>
        Live Cause List: <a href="https://hclko.allahabadhighcourt.in/causelist/input2L.jsp" target="_blank" rel="noopener" style={{color:'var(--primary)'}}>Lucknow</a> | <a href="https://www.allahabadhighcourt.in/causelist/causelist_ald.htm" target="_blank" rel="noopener" style={{color:'var(--primary)'}}>Allahabad</a>
        {isLive
          ? <span style={{marginLeft:8, fontStyle:'italic', color:'var(--success)'}}>● Live from Court Display Board (updates every 30s)</span>
          : <span style={{marginLeft:8, fontStyle:'italic'}}>(Estimated progress - connect backend for live updates)</span>
        }
      </div>
      {filteredMatters.length === 0 ? (
        <div style={{padding:12, textAlign:'center', color:'var(--text-muted)', fontSize:12}}>No hearings in this category today</div>
      ) : (
        <div style={{display:'grid', gap:8}}>
          {filteredMatters.map(m => {
            const c = getColor(m.etaMins);
            return (
              <div key={m.id} style={{display:'flex', alignItems:'center', gap:12, padding:'10px 14px', borderRadius:'var(--radius)', background:c.bg, border:'1px solid ' + c.color + '30'}}>
                <div style={{flex:1, minWidth:0}}>
                  <div style={{fontWeight:700, fontSize:13, color:c.color}}>{m.caseRef}</div>
                  <div style={{fontSize:11, color:'var(--text-secondary)'}}>{m.courtRoom} | Item #{m.userItemNo} | Currently at #{m.currentItem}</div>
                </div>
                <div style={{textAlign:'right'}}>
                  <div style={{fontWeight:800, fontSize:13, color:c.color}}>{c.label}</div>
                  <div style={{fontSize:10, color:'var(--text-muted)'}}>{m.itemsAway} items remaining</div>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function PetitionSummary({ matter, updateMatter, addToast }) {
  const m = matter;
  const [editing, setEditing] = useState(false);
  const [summary, setSummary] = useState(m.summary || {});

  const isBail = ['BAIL','ABAIL','BAILC'].includes((m.caseType || '').toUpperCase()) || (m.tags || []).includes('Bail');
  const isWrit = ['WRIA','WRIB','WRIC','WPIL','CRLP','CRPIL','HABC'].includes((m.caseType || '').toUpperCase()) || (m.tags || []).includes('Writ');
  const isAppeal = ['FAPL','SAPL','SPLA','CRLA','C372','GOVA'].includes((m.caseType || '').toUpperCase()) || (m.tags || []).includes('Appeal');

  const caseFormat = isBail ? 'bail' : isWrit ? 'writ' : isAppeal ? 'appeal' : 'general';

  const [extracting, setExtracting] = useState(false);
  const [docText, setDocText] = useState('');
  const fileInputRef = useRef(null);

  const generateFromCase = () => {
    const parts = m.title ? m.title.split(' v. ') : ['', ''];
    const gen = {
      petitioner: parts[0] || '',
      respondent: parts[1] || '',
      ...summary,
    };
    if (isBail) {
      gen.bailType = gen.bailType || ((m.caseType || '').toUpperCase() === 'ABAIL' ? 'Anticipatory Bail' : 'Regular Bail');
      gen.offences = gen.offences || '';
      gen.firDetails = gen.firDetails || '';
      gen.briefFacts = gen.briefFacts || '';
      gen.chargesheetFiled = gen.chargesheetFiled || '';
      gen.arrestDate = gen.arrestDate || '';
      gen.custodyDays = gen.custodyDays || '';
      gen.culpability = gen.culpability || '';
      gen.groundsOfPetition = gen.groundsOfPetition || '';
    }
    if (isWrit) {
      gen.reliefSought = gen.reliefSought || '';
      gen.impugnedOrder = gen.impugnedOrder || '';
      gen.groundsOfPetition = gen.groundsOfPetition || '';
    }
    if (isAppeal) {
      gen.impugnedJudgment = gen.impugnedJudgment || '';
      gen.lowerCourt = gen.lowerCourt || '';
      gen.groundsOfAppeal = gen.groundsOfAppeal || '';
    }
    setSummary(gen);
    addToast('Summary generated from case data', 'success');
  };

  // Extract text from uploaded document and generate SC-format summary
  const handleDocExtract = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    setExtracting(true);
    const reader = new FileReader();
    reader.onload = (ev) => {
      let text = '';
      if (file.type === 'text/plain' || file.name.endsWith('.txt')) {
        text = ev.target.result;
      } else {
        // For PDF/DOCX, extract readable text from the data
        const raw = ev.target.result;
        // Simple text extraction from binary — works for PDFs with embedded text
        if (file.name.endsWith('.pdf')) {
          // Extract readable portions from PDF
          const bytes = new Uint8Array(raw);
          const decoded = new TextDecoder('utf-8', { fatal: false }).decode(bytes);
          // Extract text between stream markers and parentheses
          const textParts = [];
          const parenMatches = decoded.match(/\(([^)]{3,500})\)/g);
          if (parenMatches) parenMatches.forEach(p => { const t = p.slice(1,-1).replace(/\\n/g,'\n').replace(/\\\(/g,'(').replace(/\\\)/g,')'); if (t.trim().length > 5 && !/^[^a-zA-Zऀ-ॿ]*$/.test(t)) textParts.push(t); });
          // Also try Tj/TJ operators
          const tjMatches = decoded.match(/\[([^\]]{5,})\]\s*TJ/g);
          if (tjMatches) tjMatches.forEach(t => { const inner = t.replace(/\]\s*TJ/,'').replace(/^\[/,''); const parts = inner.match(/\(([^)]+)\)/g); if(parts) parts.forEach(p => { const c = p.slice(1,-1); if(c.trim().length > 3) textParts.push(c); }); });
          text = textParts.join(' ').replace(/\s+/g, ' ').trim();
        } else {
          // DOCX: extract from XML content
          const decoded = new TextDecoder('utf-8', { fatal: false }).decode(new Uint8Array(raw));
          const xmlTexts = decoded.match(/<w:t[^>]*>([^<]+)<\/w:t>/g);
          if (xmlTexts) text = xmlTexts.map(t => t.replace(/<[^>]+>/g, '')).join(' ');
          else text = decoded.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ');
        }
      }
      setDocText(text);
      // Auto-generate SC-format summary from extracted text
      generateSCFormatSummary(text);
      setExtracting(false);
    };
    if (file.type === 'text/plain' || file.name.endsWith('.txt')) {
      reader.readAsText(file);
    } else {
      reader.readAsArrayBuffer(file);
    }
    e.target.value = '';
  };

  const generateSCFormatSummary = (text) => {
    if (!text || text.length < 20) {
      addToast('Could not extract enough text from document. Please fill summary manually.', 'error');
      return;
    }
    const t = text;
    const parts = m.title ? m.title.split(' v. ') : ['', ''];
    const gen = { ...summary };
    gen.petitioner = gen.petitioner || parts[0] || '';
    gen.respondent = gen.respondent || parts[1] || '';

    // Try to extract key information from document text
    const firMatch = t.match(/FIR\s*(?:No\.?|Number)?\s*[:\-]?\s*([\d\/\-]+)/i);
    const sectionMatch = t.match(/(?:section|u\/s|under section)\s*([\d,\s\/A-Z]+(?:\s+(?:of|r\/w)\s+[\w.]+)?)/i);
    const psMatch = t.match(/(?:Police Station|P\.?S\.?|PS)\s*[:\-]?\s*([A-Za-z\s]+?)(?:,|\.|District)/i);
    const distMatch = t.match(/(?:District)\s*[:\-]?\s*([A-Za-z\s]+?)(?:\.|,|\n)/i);
    const reliefMatch = t.match(/(?:relief|prayer|prayed|sought)\s*[:\-]?\s*(.{20,200}?)(?:\.\s|\n)/i);
    const factsMatch = t.match(/(?:brief facts|facts of the case|facts are)\s*[:\-]?\s*(.{30,500}?)(?:\.\s{2}|\n\n)/i);
    const groundsMatch = t.match(/(?:grounds|ground|contentions?|submissions?)\s*[:\-]?\s*(.{20,400}?)(?:\.\s{2}|\n\n)/i);

    if (isBail) {
      gen.bailType = gen.bailType || ((m.caseType || '').toUpperCase() === 'ABAIL' ? 'Anticipatory Bail' : 'Regular Bail');
      if (firMatch) gen.firDetails = (gen.firDetails || '') || ('FIR No. ' + firMatch[1] + (psMatch ? ', PS ' + psMatch[1].trim() : '') + (distMatch ? ', District ' + distMatch[1].trim() : ''));
      if (sectionMatch) gen.offences = gen.offences || sectionMatch[1].trim();
      if (factsMatch) gen.briefFacts = gen.briefFacts || factsMatch[1].trim();
      if (groundsMatch) gen.groundsOfPetition = gen.groundsOfPetition || groundsMatch[1].trim();
    } else if (isWrit) {

      html += '<tr><th>Lower Court</th><td>' + (summary.lowerCourt || '-') + '</td></tr>';
      html += '<tr><th>Grounds of Appeal</th><td>' + (summary.groundsOfAppeal || '-') + '</td></tr>';
      html += '</table>';
    }

    if (m.listingHistory && m.listingHistory.length > 0) {
      html += '<h3>LIST OF DATES</h3><table><tr><th>Date</th><th>Type</th><th>Order</th></tr>';
      m.listingHistory.forEach(h => { html += '<tr><td>' + fmtDate(h.date) + '</td><td>' + h.causeType + '</td><td>' + h.order + '</td></tr>'; });

  return (

// DOCUMENT TRANSLATE MODAL
// ─────────────────────────────────────────────────────────────────────
function DocTranslateModal({ doc, translateLang, setTranslateLang, onClose, documents, setDocuments, matterId, addToast }) {
  const [translating, setTranslating] = useState(false);
  const [translatedText, setTranslatedText] = useState('');
  const [progress, setProgress] = useState('');
  const [saved, setSaved] = useState(false);

  // Determine output format: preserve original format (.docx stays .docx, .txt stays .txt)
  const srcExt = (doc.name.split('.').pop() || 'txt').toLowerCase();
  const isDocx = srcExt === 'docx' || srcExt === 'doc';
  const outExt = isDocx ? 'docx' : srcExt === 'pdf' ? 'docx' : 'txt'; // PDF source → .docx output for proper Hindi
  const langSuffix = translateLang === 'hi' ? '_hindi' : '_english';
  const outputName = doc.name.replace(/\.[^.]+$/, '') + langSuffix + '.' + outExt;

  /** Build a Word-compatible .doc(x) blob with proper Hindi/Unicode support */
  const buildWordBlob = (text) => {
    const paragraphs = text.split(/\n+/).map(p => p.trim()).filter(Boolean);
    const htmlParagraphs = paragraphs.map(p =>
      '<p style="font-size:12pt;line-height:1.8;margin:0 0 6pt 0;text-align:justify;">' + p.replace(/&/g,'&amp;').replace(/</g,'&lt;') + '</p>'
    ).join('\n');

    const wordHtml = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">
<head>
<meta charset="utf-8">
<meta name="ProgId" content="Word.Document">
<style>
  body { font-family: 'Noto Sans Devanagari', 'Mangal', 'Arial Unicode MS', Arial, sans-serif; font-size: 12pt; line-height: 1.8; margin: 1in; }
  @page { size: A4; margin: 1in; }
  p { margin: 0 0 6pt 0; }
</style>
</head>
<body lang="${translateLang === 'hi' ? 'HI' : 'EN-US'}">
<div style="padding:0;">
  <div style="text-align:center;margin-bottom:16pt;border-bottom:1px solid #ccc;padding-bottom:8pt;">
    <span style="font-size:9pt;color:#888;">Translated from: ${doc.name}</span>
  </div>
  ${htmlParagraphs}
</div>
</body>
</html>`;
    return new Blob(['﻿' + wordHtml], { type: 'application/msword' });
  };

  /** Build a UTF-8 text blob with BOM for proper Hindi rendering */
  const buildTextBlob = (text) => {
    return new Blob(['﻿' + text], { type: 'text/plain;charset=utf-8' });
  };

  const doTranslate = async () => {
    setTranslating(true);
    setSaved(false);
    setProgress('Extracting text from document...');
    try {
      // Extract text from the document
      let text = '';
      if (doc.type === 'text/plain' || doc.name.endsWith('.txt')) {
        const b64 = doc.data.split(',')[1];
        const bytes = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
        text = new TextDecoder('utf-8').decode(bytes);
      } else if (doc.name.endsWith('.pdf')) {
        const b64 = doc.data.split(',')[1];
        const bytes = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
        const decoded = new TextDecoder('utf-8', { fatal: false }).decode(bytes);
        const textParts = [];
        const parenMatches = decoded.match(/\(([^)]{3,500})\)/g);
        if (parenMatches) parenMatches.forEach(p => { const t = p.slice(1,-1); if (t.trim().length > 5 && /[a-zA-Zऀ-ॿ]/.test(t)) textParts.push(t); });
        text = textParts.join(' ').replace(/\s+/g, ' ').trim();
      } else {
        // .docx: extract text from Word XML
        const b64 = doc.data.split(',')[1];
        const bytes = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
        const decoded = new TextDecoder('utf-8', { fatal: false }).decode(bytes);
        const xmlTexts = decoded.match(/<w:t[^>]*>([^<]+)<\/w:t>/g);
        if (xmlTexts) text = xmlTexts.map(t => t.replace(/<[^>]+>/g, '')).join(' ');
        else text = decoded.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ');
      }

      if (!text || text.trim().length < 10) {
        addToast('Could not extract text from this document. Try a .txt or .docx file.', 'error');
        setTranslating(false);
        return;
      }

      setProgress('Translating (' + text.length + ' chars)...');
      const srcLang = translateLang === 'hi' ? 'en' : 'hi';
      const result = await AzureTranslator.translate(text.slice(0, 20000), srcLang, translateLang);
      setTranslatedText(result);

      // Save in the correct format
      setProgress('Saving as ' + outExt.toUpperCase() + '...');
      const translatedBlob = (outExt === 'docx' || outExt === 'doc') ? buildWordBlob(result) : buildTextBlob(result);

      const reader = new FileReader();
      reader.onload = (ev) => {
        const translatedDoc = {
          id: 'doc' + Date.now() + Math.random().toString(36).slice(2,6),
          name: outputName,
          type: translatedBlob.type,
          size: translatedBlob.size,
          data: ev.target.result,
          uploadedAt: toYMD(new Date()),
          translatedFrom: doc.name,
        };
        setDocuments(prev => { const next = [...prev, translatedDoc]; LS.set('docs_' + matterId, next); return next; });
        setProgress('');
        setSaved(true);
        addToast('Translation complete! Saved as "' + outputName + '" in Documents.', 'success');
      };
      reader.readAsDataURL(translatedBlob);
    } catch (err) {
      addToast('Translation failed: ' + err.message, 'error');
      setProgress('');
    } finally {
      setTranslating(false);
    }
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" style={{width:600}} onClick={e=>e.stopPropagation()}>
        <div className="modal-header">
          <span className="modal-title">{Icons.translate} Document Translation</span>
          <button className="modal-close" onClick={onClose}>{Icons.x}</button>
        </div>
        <div className="modal-body">
          <div style={{marginBottom:12}}>
            <strong>Source:</strong> {doc.name} <span style={{fontSize:11, color:'var(--text-muted)'}}>({fmtSize(doc.size)})</span>
          </div>
          <div style={{display:'flex', gap:8, marginBottom:16}}>
            <div className="lang-toggle">
              <button className={translateLang === 'hi' ? 'active' : ''} onClick={()=>{if(!translating){setTranslateLang('hi');setTranslatedText('');setSaved(false);}}}>English → Hindi</button>
              <button className={translateLang === 'en' ? 'active' : ''} onClick={()=>{if(!translating){setTranslateLang('en');setTranslatedText('');setSaved(false);}}}>Hindi → English</button>
            </div>
          </div>
          <div style={{padding:16, background:'var(--bg-input)', borderRadius:'var(--radius)', border:'1px solid var(--border-light)', marginBottom:12}}>
            <div style={{fontSize:12, color:'var(--text-muted)', marginBottom:4}}>Output file</div>
            <div style={{fontSize:14, fontWeight:600}}>{outputName}</div>
            <div style={{fontSize:12, color:'var(--text-secondary)', marginTop:4}}>
              {outExt === 'docx' || outExt === 'doc'
                ? 'Saved as Word document with proper Hindi/Unicode font support.'
                : 'Saved as UTF-8 text file with proper encoding.'}
            </div>
          </div>
          {progress && (
            <div style={{padding:'8px 12px', background:'var(--primary-bg)', borderRadius:'var(--radius-sm)', fontSize:12, color:'var(--primary)', marginBottom:8, display:'flex', alignItems:'center', gap:8}}>
              <span className="spinner" style={{width:14,height:14,border:'2px solid rgba(79,106,246,0.2)',borderTopColor:'var(--primary)',borderRadius:'50%',animation:'spin 0.6s linear infinite',display:'inline-block'}} />
              {progress}
            </div>
          )}
          {saved && (
            <div style={{padding:'8px 12px', background:'var(--success-bg)', borderRadius:'var(--radius-sm)', fontSize:12, color:'var(--success)', marginBottom:8, display:'flex', alignItems:'center', gap:8}}>
              {Icons.checkCircle} Translation saved to Documents
            </div>
          )}
          {translatedText && (
            <div style={{marginTop:8}}>
              <div style={{fontSize:11, fontWeight:600, color:'var(--text-muted)', marginBottom:4}}>PREVIEW</div>
              <div style={{maxHeight:200, overflowY:'auto', fontSize:12, lineHeight:1.6, padding:'8px 12px', background:'var(--bg-card)', border:'1px solid var(--border)', borderRadius:'var(--radius-sm)', whiteSpace:'pre-wrap', fontFamily: translateLang === 'hi' ? "'Noto Sans Devanagari', 'Mangal', sans-serif" : 'inherit'}}>
                {translatedText.slice(0, 1000)}{translatedText.length > 1000 ? '...' : ''}
              </div>
            </div>
          )}
        </div>
        <div className="modal-footer">
          <button className="btn btn-outline" onClick={onClose}>{saved ? 'Done' : 'Close'}</button>
          {!saved ? (
            <button className="btn btn-primary" onClick={doTranslate} disabled={translating}>
              {translating ? 'Translating...' : <>{Icons.translate} Translate & Save</>}
            </button>
          ) : (
            <button className="btn btn-success" onClick={onClose}>
              {Icons.checkCircle} Saved — Close
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

// Helper for formatting size in DocTranslateModal
function fmtSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}
