// DISTRICT COURTS PAGE
// ─────────────────────────────────────────────────────────────────────
function DistrictCourtsPage() {
  const { addToast } = useContext(AppContext);
  const [search, setSearch] = useState('');
  const [selectedDistrict, setSelectedDistrict] = useState(null);
  const [collapsedDivisions, setCollapsedDivisions] = useState({});

  const ECOURTS_BASE = 'https://services.ecourts.gov.in/ecourtindia_v6/';

  const filteredDistricts = UP_DISTRICTS.filter(d => {
    if (!search) return true;
    const s = search.toLowerCase();
    return d.name.toLowerCase().includes(s) || d.nameHi.includes(search) || d.code.toLowerCase().includes(s);
  });

  const toggleDivision = (div) => setCollapsedDivisions(prev => ({...prev, [div]: !prev[div]}));

  const getDivisionDistricts = (divName) => {
    const divDistrictNames = UP_DIVISIONS[divName].districts;
    return filteredDistricts.filter(d => divDistrictNames.includes(d.name));
  };

  const openDistrictSearch = (searchType) => {
    openCourtPopup(ECOURTS_BASE, 'DistrictCourtSearch');
    addToast('eCourts portal opened' + (selectedDistrict ? ' for ' + selectedDistrict.name : '') + ' - ' + searchType.label, 'info');
  };

  const divisionCount = Object.keys(UP_DIVISIONS).length;

  const iconMap = {
    search: Icons.search, users: Icons.users, user: Icons.user,
    fileText: Icons.fileText, shield: Icons.shield, clock: Icons.clock, note: Icons.note,
  };

  return (
    <div className="content">
      <div className="page-header">
        <h2 className="page-title">District Courts</h2>
      </div>

      <div className="court-connect-banner" style={{marginBottom:20}}>
        {Icons.globe}
        <div className="banner-text">
          <h3>UP District Courts - eCourts Integration</h3>
          <p>Access all 75 district courts of Uttar Pradesh through the eCourts portal. Search cases by case number, CNR, party name, advocate, and more across any district court.</p>
        </div>
      </div>

      <div className="stats-grid" style={{marginBottom:20}}>
        <div className="stat-card">
          <div className="stat-icon" style={{background:'var(--primary-bg)', color:'var(--primary)'}}>{Icons.globe}</div>
          <div className="stat-content">
            <div className="stat-value">75</div>
            <div className="stat-label">Total Districts</div>
          </div>
        </div>
        <div className="stat-card">
          <div className="stat-icon" style={{background:'var(--success-bg)', color:'var(--success)'}}>{Icons.target}</div>
          <div className="stat-content">
            <div className="stat-value">{divisionCount}</div>
            <div className="stat-label">Divisions</div>
          </div>
        </div>
        <div className="stat-card">
          <div className="stat-icon" style={{background:'var(--warning-bg)', color:'var(--warning)'}}>{Icons.search}</div>
          <div className="stat-content">
            <div className="stat-value">{DISTRICT_SEARCH_TYPES.length}</div>
            <div className="stat-label">Search Types</div>
          </div>
        </div>
        <div className="stat-card">
          <div className="stat-icon" style={{background:'var(--info-bg)', color:'var(--info)'}}>{Icons.courtConnect}</div>
          <div className="stat-content">
            <div className="stat-value">{selectedDistrict ? selectedDistrict.name : 'None'}</div>
            <div className="stat-label">Selected District</div>
          </div>
        </div>
      </div>

      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:20, marginBottom:20}}>
        <div className="card">
          <div className="card-header">
            <span className="card-title">Select District</span>
          </div>
          <div className="card-body">
            <div className="filters-bar" style={{marginBottom:16}}>
              <div className="search-input-wrap">
                {Icons.search}
                <input placeholder="Filter districts by name..." value={search} onChange={e => setSearch(e.target.value)} />
              </div>
              <select className="form-select" style={{width:'auto', minWidth:200}} value={selectedDistrict ? selectedDistrict.code : ''} onChange={e => { const d = UP_DISTRICTS.find(x => x.code === e.target.value); setSelectedDistrict(d || null); }}>
                <option value="">Select District...</option>
                {UP_DISTRICTS.map(d => <option key={d.code} value={d.code}>{d.name} ({d.nameHi})</option>)}
              </select>
            </div>

            <div style={{maxHeight:500, overflowY:'auto'}}>
              {Object.entries(UP_DIVISIONS).map(([divName, divData]) => {
                const divDistricts = getDivisionDistricts(divName);
                if (divDistricts.length === 0) return null;
                const isCollapsed = collapsedDivisions[divName];
                return (
                  <div key={divName} className="division-section">
                    <div className="division-header" onClick={() => toggleDivision(divName)}>
                      <span className="dot" style={{background: divData.color}} />
                      <span>{divName}</span>
                      <span style={{fontSize:12, fontWeight:400, color:'var(--text-muted)', marginLeft:4}}>({divDistricts.length})</span>
                      <span style={{marginLeft:'auto', transition:'transform 0.2s', transform: isCollapsed ? 'rotate(0deg)' : 'rotate(90deg)'}}>{Icons.chevronRight}</span>
                    </div>
                    {!isCollapsed && (
                      <div className="district-grid">
                        {divDistricts.map(d => (
                          <div key={d.code} className={`district-card ${selectedDistrict && selectedDistrict.code === d.code ? 'selected' : ''}`} onClick={() => setSelectedDistrict(d)}>
                            <div className="name">{d.name}</div>
                            <div className="name-hi">{d.nameHi}</div>
                            <div style={{fontSize:11, color:'var(--text-muted)', marginTop:4}}>{d.code}</div>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        </div>

        <div>
          {selectedDistrict ? (
            <div className="card">
              <div className="card-header">
                <span className="card-title">Search in {selectedDistrict.name} ({selectedDistrict.nameHi})</span>
              </div>
              <div className="card-body">
                <div className="search-cards-grid">
                  {DISTRICT_SEARCH_TYPES.map((st, i) => (
                    <div key={i} className="search-card" onClick={() => openDistrictSearch(st)}>
                      <div className="sc-icon" style={{background: 'var(--primary-bg)', color: 'var(--primary)'}}>
                        {iconMap[st.icon] || Icons.search}
                      </div>
                      <div className="sc-text">
                        <div className="sc-label">{st.label}</div>
                        <div className="sc-desc">{st.desc}</div>
                      </div>
                      <div className="sc-arrow">{Icons.chevronRight}</div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          ) : (
            <div className="card">
              <div className="card-body">
                <div className="empty-state">
                  {Icons.globe}
                  <h3>Select a District</h3>
                  <p>Choose a district from the left panel to view search options for that district court.</p>
                </div>
              </div>
            </div>
          )}

          {/* Quick Links */}
          <div className="card" style={{marginTop:16}}>
            <div className="card-header"><span className="card-title">Quick Links</span></div>
            <div className="card-body">
              <div className="resources-grid">
                <div className="resource-card" onClick={() => { openCourtPopup(ECOURTS_BASE, 'eCourtsMain'); addToast('eCourts main portal opened', 'info'); }}>
                  <div className="rc-dot" style={{background:'var(--primary)'}} />
                  <span className="rc-label">eCourts Main Portal</span>
                  <div className="rc-ext">{Icons.externalLink}</div>
                </div>
                <div className="resource-card" onClick={() => { openCourtPopup('https://njdg.ecourts.gov.in', 'NJDG'); addToast('NJDG portal opened', 'info'); }}>
                  <div className="rc-dot" style={{background:'var(--success)'}} />
                  <span className="rc-label">National Judicial Data Grid</span>
                  <div className="rc-ext">{Icons.externalLink}</div>
                </div>
                <div className="resource-card" onClick={() => { openCourtPopup('https://districts.ecourts.gov.in/', 'DistrictCourts'); addToast('District Courts portal opened', 'info'); }}>
                  <div className="rc-dot" style={{background:'var(--warning)'}} />
                  <span className="rc-label">District Court Websites</span>
                  <div className="rc-ext">{Icons.externalLink}</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────
// AZURE TRANSLATE PANEL (was Bhashini)
// ─────────────────────────────────────────────────────────────────────
function TranslatePanel() {
  const [open, setOpen] = useState(false);
  const [srcLang, setSrcLang] = useState('en');
  const [tgtLang, setTgtLang] = useState('hi');
  const [inputText, setInputText] = useState('');
  const [outputText, setOutputText] = useState('');
  const [translating, setTranslating] = useState(false);
  const [error, setError] = useState('');
  const [languages, setLanguages] = useState(AzureTranslator._defaultLanguages());
  const [charCount, setCharCount] = useState(0);

  // Load available languages on first open
  useEffect(() => {
    if (open && languages.length <= 15) {
      AzureTranslator.getLanguages().then(langs => {
        if (langs.length > 0) setLanguages(langs);
      });
    }
  }, [open]);

  const doTranslate = async () => {
    if (!inputText.trim()) return;
    setTranslating(true);
    setError('');
    try {
      const result = await AzureTranslator.translate(inputText, srcLang, tgtLang);
      setOutputText(result);
      setCharCount(prev => prev + inputText.length);
    } catch (err) {
      setError(err.message);
      // Fallback to offline dictionary for en<->hi
      if ((srcLang === 'en' && tgtLang === 'hi') || (srcLang === 'hi' && tgtLang === 'en')) {
        const fallback = simulateTranslate(inputText, srcLang, tgtLang);
        setOutputText(fallback);
        setError(err.message + ' (showing offline dictionary fallback)');
      }
    } finally {
      setTranslating(false);
    }
  };

  // Swap languages
  const swapLangs = () => {
    setSrcLang(tgtLang);
    setTgtLang(srcLang);
    setInputText(outputText);
    setOutputText('');
  };

  // Priority languages at top
  const priorityLangs = ['en', 'hi', 'bn', 'ta', 'te', 'mr', 'gu', 'kn', 'ml', 'pa', 'ur'];
  const sortedLangs = useMemo(() => {
    const priority = languages.filter(l => priorityLangs.includes(l.code));
    const rest = languages.filter(l => !priorityLangs.includes(l.code));
    return [...priority, ...rest];
  }, [languages]);

  return (
    <>
      <button className="translate-fab" onClick={() => setOpen(!open)} title="Translate">
        {Icons.translate}
      </button>
      {open && (
        <div className="translate-panel">
          <div className="panel-header">
            <span>{Icons.translate} Translate</span>
            <button className="modal-close" style={{width:28, height:28}} onClick={() => setOpen(false)}>{Icons.x}</button>
          </div>
          <div className="panel-body">
            <div style={{display:'flex', gap:8, marginBottom:12, alignItems:'flex-end'}}>
              <div style={{flex:1}}>
                <label className="form-label">From</label>
                <select className="form-select" value={srcLang} onChange={e => setSrcLang(e.target.value)}>
                  {sortedLangs.map(l => <option key={l.code} value={l.code}>{l.name} ({l.nativeName})</option>)}
                </select>
              </div>
              <button onClick={swapLangs} title="Swap" style={{background:'none',border:'none',cursor:'pointer',padding:'8px',color:'var(--primary)',fontSize:18,marginBottom:2}}>&#8644;</button>
              <div style={{flex:1}}>
                <label className="form-label">To</label>
                <select className="form-select" value={tgtLang} onChange={e => setTgtLang(e.target.value)}>
                  {sortedLangs.map(l => <option key={l.code} value={l.code}>{l.name} ({l.nativeName})</option>)}
                </select>
              </div>
            </div>
            <textarea className="form-input" rows={3} placeholder="Enter text to translate..." value={inputText} onChange={e => setInputText(e.target.value)} style={{marginBottom:4}} />
            <div style={{fontSize:11, color:'var(--text-muted)', marginBottom:8, display:'flex', justifyContent:'space-between'}}>
              <span>{inputText.length} chars</span>
              <span>LegalDesk Translator (100+ languages)</span>
            </div>
            <button className="btn btn-primary btn-sm btn-block" onClick={doTranslate} disabled={translating || !inputText.trim()}>
              {translating ? 'Translating...' : <>{Icons.translate} Translate</>}
            </button>
            {error && (
              <div style={{marginTop:8, padding:'8px 12px', background:'var(--warning-bg)', color:'var(--warning)', borderRadius:'var(--radius-sm)', fontSize:12}}>
                {error}
              </div>
            )}
            {outputText && (
              <div style={{marginTop:12, padding:12, background:'var(--bg-input)', borderRadius:'var(--radius)', fontSize:13, lineHeight:1.6, border:'1px solid var(--border-light)', position:'relative'}}>
                <button onClick={() => { navigator.clipboard.writeText(outputText); }} title="Copy" style={{position:'absolute', top:8, right:8, background:'none', border:'none', cursor:'pointer', color:'var(--text-muted)', padding:4}}>
                  {Icons.copy}
                </button>
                {outputText}
              </div>
            )}
          </div>
        </div>
      )}
    </>
  );
}

// ─────────────────────────────────────────────────────────────────────
// MAIN APP
// ─────────────────────────────────────────────────────────────────────
function App() {
  const [user, setUser] = useState(() => LS.get('user', null));
  const [theme, setThemeState] = useState(() => LS.get('theme', 'light'));
  const [currentPage, setCurrentPage] = useState(() => LS.get('currentPage', 'dashboard'));
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [matters, setMattersState] = useState(() => LS.get('matters', DEFAULT_MATTERS));
  const [tasks, setTasksState] = useState(() => LS.get('tasks', DEFAULT_TASKS));
  const [invoices, setInvoicesState] = useState(() => LS.get('invoices', DEFAULT_INVOICES));
  const [calendarTasks, setCalendarTasksState] = useState(() => LS.get('calendarTasks', []));
  const [teamMembers, setTeamMembersState] = useState(() => LS.get('teamMembers', []));
  const [selectedMatter, setSelectedMatterState] = useState(() => {
    const savedId = LS.get('selectedMatterId');
    if (savedId) {
      const m = LS.get('matters', DEFAULT_MATTERS);
      return m.find(x => x.id === savedId) || null;
    }
    return null;
  });
  const setSelectedMatter = useCallback((m) => {
    setSelectedMatterState(m);
    LS.set('selectedMatterId', m?.id || null);
  }, []);
  const [toasts, setToasts] = useState([]);
  const [firestoreReady, setFirestoreReady] = useState(false);
  const syncTimerRef = useRef(null);
  const pendingSyncRef = useRef(new Set());

  const setTheme = useCallback((t) => { setThemeState(t); LS.set('theme', t); }, []);

  // Debounced Firestore sync — batches writes to avoid excessive calls
  const scheduleSync = useCallback((collectionName, data) => {
    // Always save to localStorage immediately (offline-first)
    LS.set(collectionName, data);
    LS.set(collectionName + '_lastSync', Date.now());
    // Queue Firestore sync
    if (user?.uid) {
      pendingSyncRef.current.add(collectionName);
      if (syncTimerRef.current) clearTimeout(syncTimerRef.current);
      syncTimerRef.current = setTimeout(() => {
        const toSync = [...pendingSyncRef.current];
        pendingSyncRef.current.clear();
        toSync.forEach(name => {
          const currentData = LS.get(name);
          if (currentData !== null) {
            FirestoreService.saveCollection(user.uid, name, currentData);
          }
        });
      }, 2000); // 2s debounce
    }
  }, [user?.uid]);

  const setMatters = useCallback((fn) => {
    setMattersState(prev => {
      const next = typeof fn === 'function' ? fn(prev) : fn;
      scheduleSync('matters', next);
      return next;
    });
  }, [scheduleSync]);
  const setTasks = useCallback((fn) => {
    setTasksState(prev => {
      const next = typeof fn === 'function' ? fn(prev) : fn;
      scheduleSync('tasks', next);
      return next;
    });
  }, [scheduleSync]);
  const setInvoices = useCallback((fn) => {
    setInvoicesState(prev => {
      const next = typeof fn === 'function' ? fn(prev) : fn;
      scheduleSync('invoices', next);
      return next;
    });
  }, [scheduleSync]);
  const setCalendarTasks = useCallback((fn) => {
    setCalendarTasksState(prev => {
      const next = typeof fn === 'function' ? fn(prev) : fn;
      scheduleSync('calendarTasks', next);
      return next;
    });
  }, [scheduleSync]);
  const setTeamMembers = useCallback((fn) => {
    setTeamMembersState(prev => {
      const next = typeof fn === 'function' ? fn(prev) : fn;
      scheduleSync('teamMembers', next);
      return next;
    });
  }, [scheduleSync]);

  const addToast = useCallback((message, type = 'info') => {
    const id = Date.now();
    setToasts(prev => [...prev, { id, message, type }]);
    setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3000);
  }, []);

  const navigate = useCallback((page) => {
    setCurrentPage(page);
    LS.set('currentPage', page);
    window.scrollTo(0, 0);
  }, []);

  useEffect(() => { document.documentElement.setAttribute('data-theme', theme); }, [theme]);

  // Load data from Firestore on login (merge with localStorage)
  useEffect(() => {
    if (!user?.uid) return;
    let cancelled = false;
    const loadFromFirestore = async () => {
      try {
        const collections = ['matters', 'tasks', 'invoices', 'calendarTasks', 'teamMembers'];
        for (const name of collections) {
          const data = await FirestoreService.getCollection(user.uid, name);
          if (data && !cancelled) {
            // Use Firestore data as source of truth on fresh login
            // Local changes during the session are synced back via scheduleSync
            const local = LS.get(name);
            const localTimestamp = LS.get(name + '_lastSync', 0);
            // Use Firestore if: no local data, or local data is from default/stale (no sync timestamp)
            const useFirestore = !local || !localTimestamp;
            if (useFirestore) {
              LS.set(name, data);
              LS.set(name + '_lastSync', Date.now());
              switch(name) {
                case 'matters': setMattersState(data); break;
                case 'tasks': setTasksState(data); break;
                case 'invoices': setInvoicesState(data); break;
                case 'calendarTasks': setCalendarTasksState(data); break;
                case 'teamMembers': setTeamMembersState(data); break;
              }
            } else {
              // Local has recent changes — push to Firestore
              FirestoreService.saveCollection(user.uid, name, local);
              LS.set(name + '_lastSync', Date.now());
            }
          }
        }
        if (!cancelled) setFirestoreReady(true);
      } catch (err) {
        console.error('[App] Firestore load error:', err);
        if (!cancelled) setFirestoreReady(true); // Continue with localStorage data
      }
    };
    loadFromFirestore();
    return () => { cancelled = true; };
  }, [user?.uid]);

  // Listen for Firebase auth state changes
  useEffect(() => {
    const unsub = AuthService.onAuthStateChanged(async (firebaseUser) => {
      if (firebaseUser && !user) {
        // User signed in via redirect or session restore
        const profile = await FirestoreService.getProfile(firebaseUser.uid);
        if (profile && profile.verified) {
          const userData = {
            ...profile,
            uid: firebaseUser.uid,
            email: firebaseUser.email,
            photoURL: firebaseUser.photoURL,
            initials: (firebaseUser.displayName || firebaseUser.email.split('@')[0]).split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2),
            verified: true,
            loginMethod: 'google',
          };
          setUser(userData);
          LS.set('user', userData);
        }
      } else if (!firebaseUser && user) {
        // User signed out externally (another tab) or auth expired
        setUser(null);
        LS.remove('user');
        LS.remove('selectedMatterId');
        LS.remove('currentPage');
        ['matters', 'tasks', 'invoices', 'calendarTasks', 'teamMembers'].forEach(n => LS.remove(n + '_lastSync'));
        setCurrentPage('dashboard');
      }
    });
    return () => unsub();
  }, []);

  // ── Fetch real cases from backend when user has a Bar Council number ──
  const [backendOnline, setBackendOnline] = useState(false);
  const [loadingLiveCases, setLoadingLiveCases] = useState(false);

  useEffect(() => {
    if (!user?.barCouncil) return;
    let cancelled = false;

    const fetchLiveCases = async () => {
      // Check if backend is reachable
      const health = await CourtAPI.healthCheck();
      if (health.status !== 'ok') {
        console.warn('[App] Backend API not reachable, using cached/demo data');
        setBackendOnline(false);
        return;
      }
      setBackendOnline(true);
      setLoadingLiveCases(true);

      try {
        const result = await CourtAPI.getAdvocateCases(user.barCouncil);
        if (cancelled) return;

        if (result.status === 'success' && result.cases.length > 0) {
          // Convert API cases to app matter format
          const liveCases = result.cases.map((c, i) => CourtAPI.apiCaseToMatter(c, i));

          // Merge with any local-only cases (manually added ones)
          const existingMatters = LS.get('matters', []);
          const localOnlyMatters = existingMatters.filter(m => !m._liveData);
          const merged = [...liveCases, ...localOnlyMatters];

          setMattersState(merged);
          LS.set('matters', merged);
          LS.set('matters_lastSync', Date.now());
          addToast(`Loaded ${liveCases.length} live case(s) from Allahabad HC`, 'success');
        } else if (result.status === 'no_cases_found') {
          addToast('No cases found for your enrollment. You can add cases manually.', 'info');
        } else if (result.status === 'captcha_failed') {
          addToast('Court portal CAPTCHA failed. Using cached data. Will retry automatically.', 'info');
        }
      } catch (err) {
        console.error('[App] Live case fetch error:', err);
      } finally {
        if (!cancelled) setLoadingLiveCases(false);
      }
    };

    fetchLiveCases();
    // Refresh every 10 minutes
    const interval = setInterval(fetchLiveCases, 10 * 60 * 1000);
    return () => { cancelled = true; clearInterval(interval); };
  }, [user?.barCouncil]);

  const handleLogin = (userData) => { setUser(userData); LS.set('user', userData); };
  const handleLogout = async () => {
    // Flush pending syncs
    if (syncTimerRef.current) clearTimeout(syncTimerRef.current);
    const toSync = [...pendingSyncRef.current];
    pendingSyncRef.current.clear();
    if (user?.uid) {
      for (const name of toSync) {
        const data = LS.get(name);
        if (data !== null) await FirestoreService.saveCollection(user.uid, name, data);
      }
      // Cache profile for quick re-login (skip verification on next sign-in)
      LS.set('profile_' + user.uid, user);
    }
    try { await AuthService.signOut(); } catch {}
    setUser(null);
    LS.remove('user');
    LS.remove('selectedMatterId');
    LS.remove('currentPage');
    LS.remove('dismissedNotifs');
    // Clear sync timestamps so next login fetches fresh from Firestore
    ['matters', 'tasks', 'invoices', 'calendarTasks', 'teamMembers'].forEach(n => LS.remove(n + '_lastSync'));
    setCurrentPage('dashboard');
  };

  // Track online/offline status
  const [isOnline, setIsOnline] = useState(navigator.onLine);
  useEffect(() => {
    const goOnline = () => { setIsOnline(true); addToast('Back online — syncing data', 'success'); };
    const goOffline = () => { setIsOnline(false); addToast('You are offline — changes saved locally', 'error'); };
    window.addEventListener('online', goOnline);
    window.addEventListener('offline', goOffline);
    return () => { window.removeEventListener('online', goOnline); window.removeEventListener('offline', goOffline); };
  }, [addToast]);

  if (!user) return <LoginPage onLogin={handleLogin} />;

  const ctx = {
    user, setUser, theme, setTheme, currentPage, navigate,
    matters, setMatters, tasks, setTasks, invoices, setInvoices,
    calendarTasks, setCalendarTasks,
    teamMembers, setTeamMembers,
    selectedMatter, setSelectedMatter, addToast, isOnline,
    backendOnline, loadingLiveCases,
  };

  const renderPage = () => {
    switch (currentPage) {
      case 'dashboard': return <DashboardPage />;
      case 'matters': return <MattersPage />;
      case 'matterdetail': return <MatterDetailPage />;
      case 'causelist': return <CauselistPage />;
      case 'displayboard': return <DisplayBoardPage />;
      case 'courtconnect': return <CourtConnectPage />;
      case 'districtcourts': return <DistrictCourtsPage />;
      case 'legalupdates': return <LegalUpdatesPage />;
      case 'firtracker': return <TrackerPage type="firtracker" />;
      case 'appealtracker': return <TrackerPage type="appealtracker" />;
      case 'caveattracker': return <TrackerPage type="caveattracker" />;
      case 'tasks': return <TasksPage />;
      case 'reports': return <ReportsPage />;
      case 'invoices': return <InvoicesPage />;
      case 'courtlinks': return <CourtLinksPage />;
      case 'settings': return <SettingsPage />;
      case 'causetemplates': return <CauseTemplatesPage />;
      default: return <DashboardPage />;
    }
  };

  return (
    <AppContext.Provider value={ctx}>
      {!isOnline && (
        <div style={{background:'var(--warning)', color:'#fff', textAlign:'center', padding:'6px 12px', fontSize:12, fontWeight:600, position:'fixed', top:0, left:0, right:0, zIndex:10000}}>
          You are offline — changes are saved locally and will sync when you reconnect
        </div>
      )}
      <div className="app-layout" style={!isOnline ? {marginTop:28} : undefined}>
        <Sidebar currentPage={currentPage} onNavigate={navigate} isOpen={sidebarOpen} onClose={()=>setSidebarOpen(false)} />
        <div className="main-area">
          <Header onToggleSidebar={()=>setSidebarOpen(!sidebarOpen)} onLogout={handleLogout} />
          {renderPage()}
        </div>
      </div>
      <ToastContainer toasts={toasts} />
      <TranslatePanel />
    </AppContext.Provider>
  );
}

// ─────────────────────────────────────────────────────────────────────
// MOUNT
// ─────────────────────────────────────────────────────────────────────
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<ErrorBoundary><App /></ErrorBoundary>);
</script>
</body>
</html>
