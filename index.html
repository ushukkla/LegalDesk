// MATTER DETAIL PAGE
// ─────────────────────────────────────────────────────────────────────
function MatterDetailPage() {
  const { selectedMatter, setSelectedMatter, matters, setMatters, navigate, addToast, teamMembers, backendOnline } = useContext(AppContext);
  const m = selectedMatter;
  const [userDate, setUserDate] = useState(m?.userNextDate || '');
  const [notes, setNotes] = useState(LS.get('notes_' + m?.id, ''));
  const [showNotes, setShowNotes] = useState(false);
  const [priority, setPriority] = useState(m?.onPriority || false);
  const [documents, setDocuments] = useState(() => LS.get('docs_' + m?.id, []));
  const [showTranslate, setShowTranslate] = useState(null);
  const [translateLang, setTranslateLang] = useState('hi');
  const [notesTab, setNotesTab] = useState('notes');
  const [fetchingHistory, setFetchingHistory] = useState(false);

  // Auto-fetch real case history from backend for live matters
  useEffect(() => {
    if (!m || !m._liveData || !backendOnline || !m.caseType || !m.caseNo || !m.year) return;
    if (m.listingHistory && m.listingHistory.length > 0) return; // Already has history
    let cancelled = false;
    setFetchingHistory(true);
    const fetchHistory = async () => {
      try {
        const bench = m.court?.includes('Lucknow') ? 'lucknow' : 'allahabad';
        const [statusRes, histRes] = await Promise.allSettled([
          CourtAPI.getCaseStatus(m.caseType, m.caseNo, m.year, bench),
          CourtAPI.getCaseHistory(m.caseType, m.caseNo, m.year, bench),
        ]);
        if (cancelled) return;
        const updates = {};
        if (statusRes.status === 'fulfilled' && statusRes.value.status === 'success') {
          const s = statusRes.value;
          if (s.petitioner) updates.title = `${s.petitioner} v. ${s.respondent || 'State'}`;
          if (s.stage) updates.stage = s.stage;
          if (s.coram) updates.coram = s.coram;
          if (s.nextHearing) updates.nextHearing = s.nextHearing;
          if (s.lastHearing) updates.lastHearing = s.lastHearing;
          if (s.filingDate) updates.firstHearing = s.filingDate;
          if (s.district) updates.district = s.district;
          if (s.firDetails) updates.firDetails = s.firDetails;
        }
        if (histRes.status === 'fulfilled' && histRes.value.status === 'success') {
          const h = histRes.value;
          if (h.listingHistory?.length > 0) {
            updates.listingHistory = h.listingHistory.map(lh => ({
              causeType: lh.purpose || 'Hearing',
              bench: lh.court || '',
              date: lh.date || '',
              order: lh.order || '',
            }));
          }
          if (h.interlocutoryApplications?.length > 0) {
            updates.iaDetails = h.interlocutoryApplications.map(ia => ({
              appId: ia.iaNumber || '',
              party: ia.type || '',
              filingDate: ia.filedOn || '',
              status: ia.status || 'Pending',
            }));
          }
        }
        if (Object.keys(updates).length > 0) {
          const updated = { ...m, ...updates, updatedAt: toYMD(new Date()) };
          setSelectedMatter(updated);
          setMatters(prev => prev.map(x => x.id === m.id ? updated : x));
          addToast('Case details updated from court portal', 'success');
        }
      } catch (err) {
        console.warn('[MatterDetail] History fetch failed:', err);
      } finally {
        if (!cancelled) setFetchingHistory(false);
      }
    };
    fetchHistory();
    return () => { cancelled = true; };
  }, [m?.id, backendOnline]);

  if (!m) return <div className="content"><div className="empty-state"><h3>No matter selected</h3><button className="btn btn-primary mt-16" onClick={()=>navigate('matters')}>Go to Matters</button></div></div>;

  const updateMatter = (updates) => {
    const updated = {...m, ...updates, updatedAt: toYMD(new Date())};
    setSelectedMatter(updated);
    setMatters(prev => prev.map(x => x.id === m.id ? updated : x));
  };

  const handleDateUpdate = () => {
    updateMatter({ userNextDate: userDate });
    addToast('User Next Date updated', 'success');
  };

  const togglePriority = () => {
    const next = !priority;
    setPriority(next);
    updateMatter({ onPriority: next });
    addToast(next ? 'Marked as priority' : 'Removed from priority', 'info');
  };

  const saveNotes = () => {
    LS.set('notes_' + m.id, notes);
    addToast('Notes saved', 'success');
  };

  const handleDocUpload = (e) => {
    const files = Array.from(e.target.files);
    const allowed = ['.pdf','.docx','.txt','.jpg','.png'];
    files.forEach(file => {
      const ext = '.' + file.name.split('.').pop().toLowerCase();
      if (!allowed.includes(ext)) { addToast('File type not supported: ' + ext, 'error'); return; }
      const reader = new FileReader();
      reader.onload = (ev) => {
        const doc = { id: 'doc' + Date.now() + Math.random().toString(36).slice(2,6), name: file.name, type: file.type, size: file.size, data: ev.target.result, uploadedAt: toYMD(new Date()) };
        setDocuments(prev => { const next = [...prev, doc]; LS.set('docs_' + m.id, next); return next; });
        addToast('Document uploaded: ' + file.name, 'success');
      };
      reader.readAsDataURL(file);
    });
    e.target.value = '';
  };

  const deleteDoc = (docId) => {
    setDocuments(prev => { const next = prev.filter(d => d.id !== docId); LS.set('docs_' + m.id, next); return next; });
    addToast('Document deleted', 'success');
  };

  const downloadDoc = (doc) => {
    const a = document.createElement('a');
    a.href = doc.data;
    a.download = doc.name;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  };

  const notifyTeam = (matter) => {
    const activeMembers = (teamMembers || []).filter(m => m.active !== false);
    if (activeMembers.length === 0) {
      addToast('No active team members. Add members in Settings.', 'error');
      return;
    }
    const text = encodeURIComponent(
      `📋 *Case Update - LegalDesk*\n\n` +
      `*Case:* ${matter.caseRef}\n` +
      `*Title:* ${matter.title}\n` +
      `*Court:* ${matter.court}\n` +
      `*Status:* ${matter.status}\n` +
      `*Stage:* ${matter.stage}\n` +
      `*Next Hearing:* ${matter.nextHearing ? fmtDate(matter.nextHearing) : 'Not scheduled'}\n` +
      `*Coram:* ${matter.coram}\n` +
      (matter.defects?.filter(d=>d.status==='open').length > 0 ? `\n⚠️ *Open Defects:* ${matter.defects.filter(d=>d.status==='open').length}\n` : '') +
      `\n_Sent via LegalDesk Team Notification_`
    );
    activeMembers.forEach((member, i) => {
      setTimeout(() => {
        window.open(`https://api.whatsapp.com/send?phone=${member.phone}&text=${text}`, '_blank');
      }, i * 500);
    });
    addToast(`Sending notification to ${activeMembers.length} team member(s)`, 'success');
  };

  const deleteMatter = () => {
    setMatters(prev => prev.filter(x => x.id !== m.id));
    addToast('Matter deleted', 'success');
    navigate('matters');
  };

  return (
    <div className="content">
      <div className="header-breadcrumb mb-16">
        <a onClick={()=>navigate('dashboard')}>Dashboard</a>
        <span>/</span>
        <a onClick={()=>navigate('matters')}>Matters</a>
        <span>/</span>
        <span>Preview</span>
      </div>

      <div className="detail-header">
        <span className="detail-case-no">{m.caseRef}</span>
        <span className={`badge ${m.status==='PENDING'?'badge-pending':'badge-closed'}`}>{m.status}</span>
        {m.onPriority && <span className="badge badge-urgent">PRIORITY</span>}
      </div>

      <div style={{marginBottom:8, fontSize:13, color:'var(--text-secondary)'}}>{m.court}</div>
      <div style={{marginBottom:20, fontSize:16, fontWeight:600}}>{m.title}</div>

      {/* Live ETA for this matter */}
      <LiveETABanner singleMatter={m} />

      <div className="detail-grid">
        <div>
          {/* Case Status */}
          <div className="card mb-24">
            <div className="card-header"><span className="card-title">Case Status</span></div>
            <div className="card-body" style={{padding:0}}>
              <table className="info-table">
                <tbody>
                  <tr><td>Last Hearing</td><td>{fmtDate(m.lastHearing)}</td></tr>
                  <tr><td>Next Hearing</td><td>
                    <div style={{display:'flex', alignItems:'center', gap:8, flexWrap:'wrap'}}>
                      <span>{fmtDate(m.nextHearing)}</span>
                      {m.nextHearing && <>
                        <button className="gcal-btn" onClick={() => { const url = buildGCalUrl(m); if(url) window.open(url, '_blank'); }} title="Add to Google Calendar">{Icons.calendar} GCal</button>
                        <button className="gcal-btn" onClick={() => { const url = buildGCalUrl(m, true); if(url) window.open(url, '_blank'); }} title="Set reminder 3 days before">{Icons.bell} Reminder</button>
                      </>}
                    </div>
                  </td></tr>
                  <tr><td>User Next Date</td><td>
                    <div style={{display:'flex', gap:8, alignItems:'center'}}>
                      <input type="date" className="form-input" style={{width:'auto'}} value={userDate} onChange={e=>setUserDate(e.target.value)} />
                      <button className="btn btn-sm btn-primary" onClick={handleDateUpdate}>Update</button>
                    </div>
                  </td></tr>
                  <tr><td>First Hearing Date</td><td>{fmtDate(m.firstHearing)}</td></tr>
                  <tr><td>Stage</td><td><span className="badge badge-info">{m.stage}</span></td></tr>
                  <tr><td>Coram</td><td>{m.coram}</td></tr>
                  <tr><td>Bench Type</td><td>{m.benchType}</td></tr>
                  <tr><td>Judicial Branch</td><td>{m.judicialBranch}</td></tr>
                  <tr><td>Causelist Type</td><td>{m.causelistType}</td></tr>
                  <tr><td>State</td><td>{m.state}</td></tr>
                  <tr><td>District</td><td>{m.district}</td></tr>
                  <tr><td>File No.</td><td>{m.fileNo}</td></tr>
                </tbody>
              </table>
            </div>
          </div>

          {/* Petition Summary */}
          <PetitionSummary matter={m} updateMatter={updateMatter} addToast={addToast} />

          {/* Listing History */}
          <div className="card mb-24">
            <div className="card-header"><span className="card-title">Listing History</span></div>
            <div className="card-body" style={{padding:0}}>
              {m.listingHistory?.length > 0 ? (
                <div className="table-wrap">
                  <table>
                    <thead><tr><th>CAUSE TYPE</th><th>BENCH</th><th>LISTING DATE</th><th>SHORT ORDER</th></tr></thead>
                    <tbody>
                      {m.listingHistory.map((h,i) => (
                        <tr key={i}><td>{h.causeType}</td><td>{h.bench}</td><td>{fmtDate(h.date)}</td><td>{h.order}</td></tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              ) : <div className="empty-state"><p>No listing history</p></div>}
            </div>
          </div>

          {/* IA Details */}
          <div className="card mb-24">
            <div className="card-header"><span className="card-title">IA Details</span></div>
            <div className="card-body" style={{padding:0}}>
              {m.iaDetails?.length > 0 ? (
                <div className="table-wrap">
                  <table>
                    <thead><tr><th>APPLICATION ID</th><th>PARTY</th><th>FILING DATE</th><th>NEXT DATE</th><th>STATUS</th></tr></thead>
                    <tbody>
                      {m.iaDetails.map((ia,i) => (
                        <tr key={i}>
                          <td style={{fontWeight:600, color:'var(--primary)'}}>{ia.appId}</td>
                          <td>{ia.party}</td><td>{fmtDate(ia.filingDate)}</td><td>{fmtDate(ia.nextDate)}</td>
                          <td><span className={`badge ${ia.status==='Pending'?'badge-pending':'badge-closed'}`}>{ia.status}</span></td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              ) : <div className="empty-state"><p>No IA details</p></div>}
            </div>
          </div>

          {/* Documents */}
          <div className="card mb-24">
            <div className="card-header">
              <span className="card-title">Documents ({documents.length})</span>
              <label className="btn btn-sm btn-primary" style={{cursor:'pointer', marginLeft:'auto'}}>
                {Icons.plus} Upload
                <input type="file" accept=".pdf,.docx,.txt,.jpg,.png" multiple onChange={handleDocUpload} style={{display:'none'}} />
              </label>
            </div>
            <div className="card-body" style={{padding: documents.length === 0 ? undefined : 0}}>
              {documents.length === 0 ? (
                <div className="empty-state"><p>No documents uploaded</p></div>
              ) : (
                <div className="table-wrap">
                  <table>
                    <thead><tr><th>NAME</th><th>SIZE</th><th>DATE</th><th>ACTIONS</th></tr></thead>
                    <tbody>
                      {documents.map(doc => (
                        <tr key={doc.id}>
                          <td style={{fontWeight:600, fontSize:12}}>{Icons.fileText} {doc.name}</td>
                          <td style={{fontSize:12}}>{fmtSize(doc.size)}</td>
                          <td style={{fontSize:12}}>{fmtDate(doc.uploadedAt)}</td>
                          <td>
                            <div style={{display:'flex', gap:4}}>
                              <button className="btn btn-sm btn-outline" onClick={()=>downloadDoc(doc)} title="Download">{Icons.download}</button>
                              <button className="btn btn-sm btn-outline" onClick={()=>{setShowTranslate(doc);setTranslateLang('hi');}} title="Translate">{Icons.translate}</button>
                              <button className="btn btn-sm btn-ghost" style={{color:'var(--danger)'}} onClick={()=>deleteDoc(doc.id)} title="Delete">{Icons.trash}</button>
                            </div>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}
            </div>
          </div>

          {/* Timeline */}
          <div className="card mb-24">
            <div className="card-header"><span className="card-title">Case Timeline</span></div>
            <div className="card-body">
              {m.listingHistory?.length > 0 ? (
                <div className="timeline">
                  {m.listingHistory.map((h,i) => (
                    <div key={i} className="timeline-item">
                      <div className="date">{fmtDate(h.date)}</div>
                      <div className="event">{h.causeType} &mdash; {h.order}</div>
                    </div>
                  ))}
                </div>
              ) : <div className="empty-state"><p>No timeline events</p></div>}
            </div>
          </div>
        </div>

        {/* Right Sidebar */}
        <div>
          <div className="action-btn-stack">
            <button className="btn btn-primary" onClick={() => {
              const link = generateCourtLink(m);
              if (link) {
                openCourtPopup(link.url, 'ViewOnCourtPortal');
                addToast('Court portal opened (' + link.bench + ' Bench) - solve the CAPTCHA to view case details', 'info');
              } else {
                addToast('Unable to generate court portal link for this case', 'error');
              }
            }}>{Icons.externalLink} View on Court Portal</button>
            <button className="btn btn-outline" onClick={() => addToast('Client details module coming soon', 'info')}>{Icons.users} Client Detail</button>
            <button className="btn btn-success" onClick={() => addToast('Order/Judgment viewer coming soon', 'info')}>{Icons.note} Order / Judgment</button>
            <button className="btn" style={{background:'#14B8A6', color:'#fff'}} onClick={()=>setShowNotes(true)}>{Icons.fileText} Notes & Docs {documents.length > 0 ? '(' + documents.length + ')' : ''}</button>
            <button className="btn" style={{background:'#25D366', color:'#fff'}} onClick={() => window.open(buildWhatsAppUrl(m), '_blank')}>{Icons.whatsapp} Share on WhatsApp</button>
            <button className="btn" style={{background:'#128C7E', color:'#fff'}} onClick={() => notifyTeam(m)}>{Icons.users} Notify Team</button>
            <button className="btn btn-warning" onClick={()=>navigate('causelist')}>{Icons.receipt} Invoices</button>
            <button className="btn btn-danger" onClick={deleteMatter}>{Icons.trash} Delete Matter</button>
            <button className="btn btn-outline" onClick={()=>addToast('Matter data refreshed', 'success')}>{Icons.refresh} Refresh Matter</button>
          </div>

          <div className="card" style={{marginTop:16}}>
            <div className="card-body">
              <div className="priority-row">
                <span style={{fontWeight:600, fontSize:13}}>On Priority</span>
                <label className="toggle" style={{marginLeft:'auto'}}>
                  <input type="checkbox" checked={priority} onChange={togglePriority} />
                  <div className="toggle-track" />
                  <div className="toggle-thumb" />
                </label>
              </div>
              <div style={{fontSize:12, color:'var(--text-muted)', marginTop:12}}>
                <div>Created: {fmtDate(m.createdAt)}</div>
                <div>Updated: {fmtDate(m.updatedAt)}</div>
              </div>
            </div>
          </div>

          <TagsCard matter={m} updateMatter={updateMatter} />
          <DefectCard matter={m} updateMatter={updateMatter} />
        </div>
      </div>

      {/* Notes & Documents Modal */}
      {showNotes && (
        <div className="modal-overlay" onClick={()=>setShowNotes(false)}>
          <div className="modal" style={{width:600}} onClick={e=>e.stopPropagation()}>
            <div className="modal-header">
              <span className="modal-title">Notes & Documents</span>
              <button className="modal-close" onClick={()=>setShowNotes(false)}>{Icons.x}</button>
            </div>
            <div style={{display:'flex', gap:0, borderBottom:'1px solid var(--border-light)', padding:'0 24px'}}>
              <button style={{padding:'10px 16px', fontSize:13, fontWeight:600, border:'none', cursor:'pointer', background:'transparent', borderBottom: notesTab==='notes' ? '2px solid var(--primary)' : '2px solid transparent', color: notesTab==='notes' ? 'var(--primary)' : 'var(--text-secondary)', fontFamily:'var(--font)'}} onClick={()=>setNotesTab('notes')}>Notes</button>
              <button style={{padding:'10px 16px', fontSize:13, fontWeight:600, border:'none', cursor:'pointer', background:'transparent', borderBottom: notesTab==='docs' ? '2px solid var(--primary)' : '2px solid transparent', color: notesTab==='docs' ? 'var(--primary)' : 'var(--text-secondary)', fontFamily:'var(--font)'}} onClick={()=>setNotesTab('docs')}>Documents ({documents.length})</button>
            </div>
            <div className="modal-body">
              {notesTab === 'notes' ? (
                <div className="form-group">
                  <label className="form-label">Case Notes</label>
                  <textarea className="form-input" rows={6} value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Add your notes here..." />
                </div>
              ) : (
                <div>
                  <label className="btn btn-sm btn-primary" style={{cursor:'pointer', marginBottom:12, display:'inline-flex'}}>
                    {Icons.plus} Upload Document
                    <input type="file" accept=".pdf,.docx,.txt,.jpg,.png" multiple onChange={handleDocUpload} style={{display:'none'}} />
                  </label>
                  {documents.length === 0 ? (
                    <div style={{textAlign:'center', padding:20, color:'var(--text-muted)'}}>No documents uploaded yet</div>
                  ) : documents.map(doc => (
                    <div key={doc.id} style={{display:'flex', alignItems:'center', gap:10, padding:'8px 0', borderBottom:'1px solid var(--border-light)'}}>
                      <div style={{flex:1, minWidth:0}}>
                        <div style={{fontSize:13, fontWeight:600, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>{doc.name}</div>
                        <div style={{fontSize:11, color:'var(--text-muted)'}}>{fmtSize(doc.size)} &middot; {fmtDate(doc.uploadedAt)}</div>
                      </div>
                      <button className="btn btn-sm btn-outline" onClick={()=>downloadDoc(doc)}>{Icons.download}</button>
                      <button className="btn btn-sm btn-outline" onClick={()=>{setShowTranslate(doc);setTranslateLang('hi');}}>{Icons.translate}</button>
                      <button className="btn btn-sm btn-ghost" style={{color:'var(--danger)'}} onClick={()=>deleteDoc(doc.id)}>{Icons.trash}</button>
                    </div>
                  ))}
                </div>
              )}
            </div>
            <div className="modal-footer">
              <button className="btn btn-outline" onClick={()=>setShowNotes(false)}>Close</button>
              {notesTab === 'notes' && <button className="btn btn-primary" onClick={()=>{saveNotes();setShowNotes(false);}}>Save Notes</button>}
            </div>
          </div>
        </div>
      )}

      {/* Translation Modal */}
      {showTranslate && <DocTranslateModal doc={showTranslate} translateLang={translateLang} setTranslateLang={setTranslateLang} onClose={()=>setShowTranslate(null)} documents={documents} setDocuments={setDocuments} matterId={m.id} addToast={addToast} />}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────
// CAUSELIST PAGE (Court Cause List + Invoices)
// ─────────────────────────────────────────────────────────────────────
function CauselistPage() {
  const { invoices, setInvoices, addToast, matters, user } = useContext(AppContext);
  const [activeTab, setActiveTab] = useState('causelist');
  const [causeDate, setCauseDate] = useState(toYMD(new Date()));
  const [manualEntries, setManualEntries] = useState(() => LS.get('causelistManual', []));
  const [showAddEntry, setShowAddEntry] = useState(false);
  const [entryForm, setEntryForm] = useState({ courtSection:'B1', caseNo:'', benchName:'', type:'', itemNo:'', counsel:'', lastDate:'', nextDate:'' });

  // Invoice state
  const [search, setSearch] = useState('');
  const [showModal, setShowModal] = useState(false);
  const [withMatter, setWithMatter] = useState(true);
  const [form, setForm] = useState({ subject: '', total: '', matterId: '' });

  const COURT_SECTIONS = [
    { key: 'A', label: 'SUPREME COURT' },
    { key: 'B1', label: 'ALLAHABAD HIGH COURT (LUCKNOW BENCH) - FRESH', sub: 'Fresh' },
    { key: 'B2', label: 'ALLAHABAD HIGH COURT (LUCKNOW BENCH) - ADDITIONAL', sub: 'Additional' },
    { key: 'B3', label: 'ALLAHABAD HIGH COURT (LUCKNOW BENCH) - APPLICATION', sub: 'Application' },
    { key: 'C', label: 'ALLAHABAD HIGH COURT (ALLAHABAD)' },
    { key: 'D', label: 'DELHI HIGH COURT' },
    { key: 'E', label: 'ANY OTHER HIGH COURT' },
    { key: 'F', label: 'DISTRICT COURT' },
    { key: 'G', label: 'TRIBUNALS (DRT/NCLT/NCLAT)' },
  ];

  const classifyCourt = (m) => {
    const court = (m.court || '').toLowerCase();
    const clType = (m.causelistType || '').toLowerCase();
    if (court.includes('supreme')) return 'A';
    if (court.includes('lucknow')) {
      if (clType === 'fresh') return 'B1';
      if (clType === 'supplementary' || clType === 'additional') return 'B2';
      if (clType === 'application') return 'B3';
      return 'B1';
    }
    if (court.includes('allahabad') || court.includes('high court')) return 'C';
    if (court.includes('delhi')) return 'D';
    if (court.includes('district')) return 'F';
    if (court.includes('tribunal') || court.includes('drt') || court.includes('nclt')) return 'G';
    return 'E';
  };

  const pendingMatters = matters.filter(m => m.status === 'PENDING' && m.nextHearing);
  const dateMatters = pendingMatters.filter(m => m.nextHearing === causeDate);

  const groupedEntries = {};
  COURT_SECTIONS.forEach(s => { groupedEntries[s.key] = []; });

  dateMatters.forEach((m, idx) => {
    const section = classifyCourt(m);
    groupedEntries[section].push({
      source: 'matter', matter: m,
      itemNo: m.itemNo || (idx + 1),
      benchName: m.coram || m.benchType || '',
      type: m.causelistType || m.stage || '',
      caseNo: m.caseRef,
      lastDate: m.lastHearing,
      nextDate: m.nextHearing,
      counsel: user?.name || '',
    });
  });

  manualEntries.filter(e => e.date === causeDate).forEach(e => {
    if (groupedEntries[e.courtSection]) {
      groupedEntries[e.courtSection].push({ source: 'manual', ...e });
    }
  });

  const addManualEntry = () => {
    if (!entryForm.caseNo) { addToast('Enter case number', 'error'); return; }
    const entry = { ...entryForm, id: 'ce' + Date.now(), date: causeDate, itemNo: entryForm.itemNo || '' };
    const next = [...manualEntries, entry];
    setManualEntries(next);
    LS.set('causelistManual', next);
    setShowAddEntry(false);
    setEntryForm({ courtSection:'B1', caseNo:'', benchName:'', type:'', itemNo:'', counsel:'', lastDate:'', nextDate:'' });
    addToast('Entry added to cause list', 'success');
  };

  const removeManualEntry = (id) => {
    const next = manualEntries.filter(e => e.id !== id);
    setManualEntries(next);
    LS.set('causelistManual', next);
    addToast('Entry removed', 'success');
  };

  const totalEntries = Object.values(groupedEntries).reduce((s, arr) => s + arr.length, 0);

  const printCauseList = () => {
    const printWin = window.open('', '_blank');
    let html = `<html><head><title>Cause List - ${fmtDateLong(causeDate)}</title><style>
      body{font-family:'Times New Roman',serif;font-size:12px;padding:20px 40px;color:#000;}
      h1{text-align:center;font-size:18px;margin-bottom:4px;}
      h2{text-align:center;font-size:14px;color:#555;margin-bottom:16px;}
      h3{font-size:13px;background:#f0f0f0;padding:6px 10px;margin:12px 0 6px;border-left:3px solid #333;}
      table{width:100%;border-collapse:collapse;margin-bottom:12px;}
      th,td{border:1px solid #ccc;padding:5px 8px;font-size:11px;text-align:left;}
      th{background:#f5f5f5;font-weight:700;}
      .empty{color:#999;font-style:italic;padding:8px;}
      @media print{body{padding:10px 20px;}}
    </style></head><body>`;
    html += '<h1>CAUSE LIST</h1>';
    html += '<h2>' + fmtDateLong(causeDate) + ' | ' + (user?.name || 'Advocate') + '</h2>';
    let slNo = 1;
    COURT_SECTIONS.forEach(s => {
      const entries = groupedEntries[s.key];
      html += '<h3>' + s.label + '</h3>';
      if (entries.length === 0) { html += '<div class="empty">No entries</div>'; return; }
      html += '<table><thead><tr><th>Sl.</th><th>Item</th><th>Bench/Court</th><th>Type</th><th>Case No.</th><th>Last Date / Next Date</th><th>Counsel</th></tr></thead><tbody>';
      entries.forEach(e => {
        html += '<tr><td>' + (slNo++) + '</td><td>' + (e.itemNo || '-') + '</td><td>' + (e.benchName || '-') + '</td><td>' + (e.type || '-') + '</td><td>' + (e.caseNo || '-') + '</td><td>' + (e.lastDate ? fmtDate(e.lastDate) : '-') + ' / ' + (e.nextDate ? fmtDate(e.nextDate) : '-') + '</td><td>' + (e.counsel || '-') + '</td></tr>';
      });
      html += '</tbody></table>';
    });
    html += '</body></html>';
    printWin.document.write(html);
    printWin.document.close();
    printWin.print();
  };

  // Invoice functions
  const filtered = invoices.filter(inv => {
    if (!search) return true;
    return inv.subject.toLowerCase().includes(search.toLowerCase());
  });

  const addInvoice = () => {
    if (!form.subject || !form.total) { addToast('Fill subject and amount', 'error'); return; }
    const inv = {
      id: 'inv' + Date.now(),
      subject: form.subject,
      total: parseFloat(form.total),
      date: toYMD(new Date()),
      matterId: form.matterId || null,
    };
    setInvoices(prev => [...prev, inv]);
    setShowModal(false);
    setForm({ subject: '', total: '', matterId: '' });
    addToast('Invoice created', 'success');
  };

  return (
    <div className="content">
      <div className="page-header">
        <h2 className="page-title">Causelist</h2>
        <div style={{display:'flex', gap:8}}>
          <div style={{display:'inline-flex', borderRadius:'var(--radius-full)', overflow:'hidden', border:'1px solid var(--border)'}}>
            <button style={{padding:'6px 16px', fontSize:13, fontWeight:600, border:'none', cursor:'pointer', background: activeTab==='causelist' ? 'var(--primary)' : 'transparent', color: activeTab==='causelist' ? '#fff' : 'var(--text-secondary)', fontFamily:'var(--font)'}} onClick={()=>setActiveTab('causelist')}>Cause List</button>
            <button style={{padding:'6px 16px', fontSize:13, fontWeight:600, border:'none', cursor:'pointer', background: activeTab==='invoices' ? 'var(--primary)' : 'transparent', color: activeTab==='invoices' ? '#fff' : 'var(--text-secondary)', fontFamily:'var(--font)'}} onClick={()=>setActiveTab('invoices')}>Invoices</button>
          </div>
        </div>
      </div>

      {activeTab === 'causelist' ? (
        <>
          <div className="card mb-24">
            <div className="card-body" style={{padding:16}}>
              <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', flexWrap:'wrap', gap:12}}>
                <div style={{display:'flex', alignItems:'center', gap:12}}>
                  <div style={{display:'flex', alignItems:'center', gap:8}}>
                    {Icons.calendar}
                    <input type="date" className="form-input" style={{width:'auto'}} value={causeDate} onChange={e=>setCauseDate(e.target.value)} />
                  </div>
                  <span style={{fontSize:15, fontWeight:700}}>Cause List &mdash; {fmtDateLong(causeDate)}</span>
                  <span className="badge badge-info">{totalEntries} entries</span>
                </div>
                <div style={{display:'flex', gap:8}}>
                  <button className="btn btn-sm btn-primary" onClick={()=>setShowAddEntry(true)}>{Icons.plus} Add Entry</button>
                  <button className="btn btn-sm btn-outline" onClick={printCauseList}>{Icons.download} Download / Print</button>
                </div>
              </div>
              <div style={{fontSize:13, color:'var(--text-secondary)', marginTop:6}}>
                Advocate: <strong>{user?.name || 'N/A'}</strong> | Bar Council: <strong>{user?.barCouncil || 'N/A'}</strong>
              </div>
            </div>
          </div>

          {COURT_SECTIONS.map(section => {
            const entries = groupedEntries[section.key];
            return (
              <div key={section.key} className="card mb-24">
                <div className="card-header" style={{background: entries.length > 0 ? 'var(--primary-bg)' : 'transparent'}}>
                  <span className="card-title" style={{fontSize:13}}>{section.label}</span>
                  <span className="badge" style={{background: entries.length > 0 ? 'var(--primary)' : 'var(--bg-hover)', color: entries.length > 0 ? '#fff' : 'var(--text-muted)', fontSize:11, padding:'2px 8px', borderRadius:'var(--radius-full)'}}>{entries.length}</span>
                </div>
                <div className="card-body" style={{padding:0}}>
                  {entries.length === 0 ? (
                    <div style={{padding:'12px 16px', fontSize:12, color:'var(--text-muted)', fontStyle:'italic'}}>No entries for this section</div>
                  ) : (
                    <div className="table-wrap">
                      <table>
                        <thead><tr><th style={{width:50}}>Sl.</th><th style={{width:60}}>Item</th><th>Bench / Court</th><th>Type</th><th>Case No.</th><th>Last Date / Next Date</th><th>Counsel / Clerk</th><th style={{width:60}}>Action</th></tr></thead>
                        <tbody>
                          {entries.map((e, idx) => (
                            <tr key={e.source === 'manual' ? e.id : (e.matter?.id || idx)}>
                              <td>{idx + 1}</td>
                              <td>{e.itemNo || '-'}</td>
                              <td style={{fontSize:12}}>{e.benchName || '-'}</td>
                              <td><span className="badge badge-info" style={{fontSize:10}}>{e.type || '-'}</span></td>
                              <td style={{fontWeight:600, color:'var(--primary)'}}>{e.caseNo}</td>
                              <td style={{fontSize:12}}>{e.lastDate ? fmtDate(e.lastDate) : '-'} / {e.nextDate ? fmtDate(e.nextDate) : '-'}</td>
                              <td style={{fontSize:12}}>{e.counsel || '-'}</td>
                              <td>
                                {e.source === 'manual' && (
                                  <button className="btn btn-sm btn-ghost" style={{color:'var(--danger)'}} onClick={()=>removeManualEntry(e.id)}>{Icons.trash}</button>
                                )}
                              </td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  )}
                </div>
              </div>
            );
          })}

          {/* Sequence of Taking Matters */}
          {totalEntries > 0 && (
            <div className="card mb-24">
              <div className="card-header"><span className="card-title">Sequence of Taking Matters</span></div>
              <div className="card-body">
                <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(180px, 1fr))', gap:10}}>

                      <div style={{color:'var(--text-muted)', fontStyle:'italic'}}>No entries</div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}
        </>
      ) : (
        /* Invoices Tab */
        <>
          <div style={{display:'flex', gap:10, marginBottom:16}}>
            <button className="btn btn-primary" onClick={()=>{setWithMatter(true);setShowModal(true);}}>{Icons.plus} Add With Matter</button>
            <button className="btn btn-success" onClick={()=>{setWithMatter(false);setShowModal(true);}}>{Icons.plus} Add Without Matter</button>
          </div>
          <div className="card">
            <div className="card-body">
              <div className="filters-bar">
                <div className="search-input-wrap">
                  {Icons.search}
                  <input placeholder="Search invoices..." value={search} onChange={e=>setSearch(e.target.value)} />
                </div>
              </div>
              <div className="table-wrap">
                <table>
                  <thead><tr><th>INVOICE</th><th>SUBJECT</th><th>TOTAL</th><th>DATE</th><th>ACTION</th></tr></thead>

                      <tr><td colSpan="5"><div className="empty-state"><h3>No invoices</h3></div></td></tr>

                        <td>{inv.subject}</td>
                        <td style={{fontWeight:700}}>&#8377;{inv.total.toLocaleString('en-IN')}</td>
                        <td>{fmtDate(inv.date)}</td>
                        <td>
                          <div style={{display:'flex', gap:6}}>
                            <button className="btn btn-sm btn-outline" onClick={()=>addToast('PDF export coming soon','info')}>{Icons.download}</button>

                              onClick={()=>{setInvoices(prev=>prev.filter(x=>x.id!==inv.id));addToast('Invoice deleted','success');}}>
                              {Icons.trash}
                            </button>
                          </div>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </>
      )}

      {/* Add Entry Modal */}
      {showAddEntry && (
        <div className="modal-overlay" onClick={()=>setShowAddEntry(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-header">
              <span className="modal-title">Add Manual Cause List Entry</span>
              <button className="modal-close" onClick={()=>setShowAddEntry(false)}>{Icons.x}</button>
            </div>
            <div className="modal-body">
              <div className="form-group">
                <label className="form-label">Court Section</label>
                <select className="form-select" value={entryForm.courtSection} onChange={e=>setEntryForm({...entryForm, courtSection:e.target.value})}>
                  {COURT_SECTIONS.map(s => <option key={s.key} value={s.key}>{s.label}</option>)}
                </select>
              </div>
              <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:12}}>
                <div className="form-group">
                  <label className="form-label">Case No.</label>
                  <input className="form-input" placeholder="e.g. BAIL/1234/2026" value={entryForm.caseNo} onChange={e=>setEntryForm({...entryForm, caseNo:e.target.value})} />
                </div>
                <div className="form-group">
                  <label className="form-label">Item No.</label>
                  <input className="form-input" placeholder="e.g. 15" value={entryForm.itemNo} onChange={e=>setEntryForm({...entryForm, itemNo:e.target.value})} />
                </div>
              </div>
              <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:12}}>
                <div className="form-group">
                  <label className="form-label">Bench / Court Name</label>
                  <input className="form-input" placeholder="e.g. Hon. Justice A.K. Sharma" value={entryForm.benchName} onChange={e=>setEntryForm({...entryForm, benchName:e.target.value})} />
                </div>
                <div className="form-group">
                  <label className="form-label">Type</label>
                  <input className="form-input" placeholder="e.g. Fresh / Regular / Application" value={entryForm.type} onChange={e=>setEntryForm({...entryForm, type:e.target.value})} />
                </div>
              </div>
              <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:12}}>
                <div className="form-group">
                  <label className="form-label">Last Date</label>
                  <input type="date" className="form-input" value={entryForm.lastDate} onChange={e=>setEntryForm({...entryForm, lastDate:e.target.value})} />
                </div>
                <div className="form-group">
                  <label className="form-label">Next Date</label>
                  <input type="date" className="form-input" value={entryForm.nextDate} onChange={e=>setEntryForm({...entryForm, nextDate:e.target.value})} />
                </div>
              </div>
              <div className="form-group">
                <label className="form-label">Counsel / Clerk</label>
                <input className="form-input" placeholder="Advocate name" value={entryForm.counsel} onChange={e=>setEntryForm({...entryForm, counsel:e.target.value})} />
              </div>
            </div>
            <div className="modal-footer">
              <button className="btn btn-outline" onClick={()=>setShowAddEntry(false)}>Cancel</button>
              <button className="btn btn-primary" onClick={addManualEntry}>Add Entry</button>
            </div>
          </div>
        </div>
      )}

      {/* Invoice Modal */}
      {showModal && (
        <div className="modal-overlay" onClick={()=>setShowModal(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-header">
              <span className="modal-title">{withMatter ? 'Add Invoice With Matter' : 'Add Invoice Without Matter'}</span>
              <button className="modal-close" onClick={()=>setShowModal(false)}>{Icons.x}</button>
            </div>
            <div className="modal-body">
              {withMatter && (
                <div className="form-group">
                  <label className="form-label">Select Matter</label>
                  <select className="form-select" value={form.matterId} onChange={e=>setForm({...form, matterId:e.target.value})}>
                    <option value="">Select...</option>
                    {matters.filter(m=>m.status==='PENDING').map(m => <option key={m.id} value={m.id}>{m.caseRef} - {m.title.slice(0,40)}</option>)}
                  </select>
                </div>
              )}
              <div className="form-group">
                <label className="form-label">Subject</label>
                <input className="form-input" placeholder="Invoice subject" value={form.subject} onChange={e=>setForm({...form, subject:e.target.value})} />
              </div>
              <div className="form-group">
                <label className="form-label">Total Amount (INR)</label>
                <input className="form-input" type="number" placeholder="e.g. 25000" value={form.total} onChange={e=>setForm({...form, total:e.target.value})} />
              </div>
            </div>
            <div className="modal-footer">
              <button className="btn btn-outline" onClick={()=>setShowModal(false)}>Cancel</button>
              <button className="btn btn-primary" onClick={addInvoice}>Create Invoice</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────
// REPORTS (CALENDAR) PAGE
// ─────────────────────────────────────────────────────────────────────
function ReportsPage() {
  const { matters, calendarTasks, setCalendarTasks, addToast } = useContext(AppContext);
  const [currentMonth, setCurrentMonth] = useState(new Date(2026, 4, 1)); // May 2026
  const [categories, setCategories] = useState({ matter: true, business: true, chamber: true, personal: true, etc: true });
  const [showTaskModal, setShowTaskModal] = useState(false);
  const [taskForm, setTaskForm] = useState({ category: 'matter', date: '', title: '', description: '' });

  const year = currentMonth.getFullYear();
  const month = currentMonth.getMonth();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const prevDays = new Date(year, month, 0).getDate();
  const today = new Date(2026, 4, 18);

  const days = [];
  for (let i = firstDay - 1; i >= 0; i--) days.push({ day: prevDays - i, other: true });
  for (let i = 1; i <= daysInMonth; i++) days.push({ day: i, other: false });
  const remaining = 42 - days.length;
  for (let i = 1; i <= remaining; i++) days.push({ day: i, other: true });

  const events = {};
  matters.forEach(m => {
    if (m.nextHearing) {
      const d = new Date(m.nextHearing);
      if (d.getMonth() === month && d.getFullYear() === year) {
        const key = d.getDate();
        if (!events[key]) events[key] = [];
        events[key].push({ label: m.caseRef, color: m.onPriority ? 'var(--danger)' : 'var(--primary)', matter: m });
      }
    }
  });
  const catColors = { matter: 'var(--primary)', business: 'var(--success)', chamber: 'var(--warning)', personal: 'var(--info)', etc: 'var(--text-muted)' };

  // Add calendar tasks to events
  calendarTasks.forEach(ct => {
    if (ct.date) {
      const d = new Date(ct.date);
      if (d.getMonth() === month && d.getFullYear() === year) {
        const key = d.getDate();
        if (!events[key]) events[key] = [];
        const catColor = catColors[ct.category] || 'var(--text-muted)';
        if (categories[ct.category]) {
          events[key].push({ label: ct.title, color: catColor, isTask: true });
        }
      }
    }
  });

  const addCalendarTask = () => {
    if (!taskForm.title || !taskForm.date) { addToast('Please fill title and date', 'error'); return; }
    setCalendarTasks(prev => [...prev, { ...taskForm, id: 'ct' + Date.now() }]);
    setShowTaskModal(false);
    setTaskForm({ category: 'matter', date: '', title: '', description: '' });
    addToast('Calendar task added', 'success');
  };

  const handleEventClick = (ev) => {
    if (ev.matter) {
      const url = buildGCalUrl(ev.matter);
      if (url) window.open(url, '_blank');
    }
  };

  const prevMonth = () => setCurrentMonth(new Date(year, month - 1, 1));
  const nextMonth = () => setCurrentMonth(new Date(year, month + 1, 1));
  const monthName = currentMonth.toLocaleDateString('en-IN', { month: 'long', year: 'numeric' });

  return (
    <div className="content">
      <div className="page-header">
        <h2 className="page-title">Reports</h2>
        <button className="btn btn-primary" onClick={() => setShowTaskModal(true)}>{Icons.plus} Add New Task</button>
      </div>
      <div className="calendar-grid">
        <div className="card">
          <div className="card-header"><span className="card-title">Categories</span></div>
          <div className="card-body">
            {Object.entries(catColors).map(([key, color]) => (
              <label key={key} style={{display:'flex', alignItems:'center', gap:8, padding:'6px 0', cursor:'pointer', fontSize:13, textTransform:'capitalize'}}>
                <input type="checkbox" checked={categories[key]} onChange={()=>setCategories(p=>({...p,[key]:!p[key]}))} style={{accentColor:color}} />
                <span style={{width:10, height:10, borderRadius:3, background:color}} />
                {key === 'etc' ? 'ETC' : key}
              </label>
            ))}
          </div>
        </div>
        <div className="card">
          <div className="card-body">
            <div className="cal-header">
              <button className="btn btn-ghost btn-sm" onClick={prevMonth}>&laquo; Prev</button>
              <span style={{fontWeight:700, fontSize:16}}>{monthName}</span>
              <button className="btn btn-ghost btn-sm" onClick={nextMonth}>Next &raquo;</button>
            </div>
            <div className="cal-days">
              {['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d => <div key={d} className="cal-day-header">{d}</div>)}
              {days.map((d, i) => {
                const isToday = !d.other && d.day === today.getDate() && month === today.getMonth() && year === today.getFullYear();
                return (
                  <div key={i} className={`cal-day ${isToday?'today':''} ${d.other?'other-month':''}`}>
                    <div className="cal-day-num">{d.day}</div>
                    {!d.other && events[d.day]?.map((ev, j) => (
                      <div key={j} className="cal-event" style={{background:ev.color, color:'#fff', cursor: ev.matter ? 'pointer' : 'default'}}
                        onClick={() => handleEventClick(ev)} title={ev.matter ? 'Click to add to Google Calendar' : ev.label}>{ev.label}</div>
                    ))}
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      </div>

      {showTaskModal && (
        <div className="modal-overlay" onClick={() => setShowTaskModal(false)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-header">
              <span className="modal-title">Add Calendar Task</span>
              <button className="modal-close" onClick={() => setShowTaskModal(false)}>{Icons.x}</button>
            </div>
            <div className="modal-body">
              <div className="form-group">
                <label className="form-label">Category</label>
                <select className="form-select" value={taskForm.category} onChange={e => setTaskForm({...taskForm, category: e.target.value})}>
                  <option value="matter">Matter</option>
                  <option value="business">Business</option>
                  <option value="chamber">Chamber</option>
                  <option value="personal">Personal</option>
                  <option value="etc">ETC</option>
                </select>
              </div>
              <div className="form-group">
                <label className="form-label">Date</label>
                <input type="date" className="form-input" value={taskForm.date} onChange={e => setTaskForm({...taskForm, date: e.target.value})} />
              </div>
              <div className="form-group">
                <label className="form-label">Title</label>
                <input className="form-input" placeholder="Task title" value={taskForm.title} onChange={e => setTaskForm({...taskForm, title: e.target.value})} />
              </div>
              <div className="form-group">
                <label className="form-label">Description</label>
                <textarea className="form-input" rows={3} placeholder="Task description (optional)" value={taskForm.description} onChange={e => setTaskForm({...taskForm, description: e.target.value})} />
              </div>
            </div>
            <div className="modal-footer">
              <button className="btn btn-outline" onClick={() => setShowTaskModal(false)}>Cancel</button>
              <button className="btn btn-primary" onClick={addCalendarTask}>Add Task</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// INVOICES (MONTHLY REPORTS)

function InvoicesPage() {
  const { invoices, addToast } = useContext(AppContext);
  const [viewReport, setViewReport] = useState(null);

  const getMonthInvoices = (reportFor) => {
    const [monthName, yearStr] = reportFor.split(' ');
    const monthIdx = new Date(Date.parse(monthName + ' 1, 2000')).getMonth();
    const yr = parseInt(yearStr);
    return invoices.filter(inv => {
      const d = new Date(inv.date);
      return d.getMonth() === monthIdx && d.getFullYear() === yr;
    });
  };

  return (
    <div className="content">
      <div className="page-header"><h2 className="page-title">Invoice Reports</h2></div>
      <div className="card">
        <div className="card-body" style={{padding:0}}>
          <div className="table-wrap">
            <table>
              <thead><tr><th>REPORT FOR</th><th>CREATED AT</th><th>ACTION</th></tr></thead>
              <tbody>
                {INVOICE_REPORTS.map(r => (
                  <tr key={r.id}>
                    <td style={{fontWeight:600}}>{r.reportFor}</td>
                    <td>{fmtDate(r.createdAt)}</td>
                    <td><button className="btn btn-sm btn-primary" onClick={() => setViewReport(r)}>{Icons.eye} View</button></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      </div>

      {viewReport && (() => {
        const monthInvs = getMonthInvoices(viewReport.reportFor);
        const totalBilled = monthInvs.reduce((sum, inv) => sum + inv.total, 0);
        return (
          <div className="modal-overlay" onClick={() => setViewReport(null)}>
            <div className="modal" style={{width:600}} onClick={e => e.stopPropagation()}>
              <div className="modal-header">
                <span className="modal-title">Invoice Report - {viewReport.reportFor}</span>
                <button className="modal-close" onClick={() => setViewReport(null)}>{Icons.x}</button>
              </div>
              <div className="modal-body">
                <div style={{display:'flex', gap:20, marginBottom:20}}>
                  <div className="stat-card" style={{flex:1}}>
                    <div className="stat-content">
                      <div className="stat-value" style={{fontSize:22, color:'var(--primary)'}}>&#8377;{totalBilled.toLocaleString('en-IN')}</div>
                      <div className="stat-label">Total Billed</div>
                    </div>
                  </div>
                  <div className="stat-card" style={{flex:1}}>
                    <div className="stat-content">
                      <div className="stat-value" style={{fontSize:22, color:'var(--success)'}}>{monthInvs.length}</div>
                      <div className="stat-label">Invoice Count</div>
                    </div>
                  </div>
                </div>
                {monthInvs.length > 0 ? (
                  <div className="table-wrap">
                    <table>
                      <thead><tr><th>INVOICE</th><th>SUBJECT</th><th>AMOUNT</th><th>DATE</th></tr></thead>
                      <tbody>
                        {monthInvs.map(inv => (
                          <tr key={inv.id}>
                            <td style={{fontWeight:600, color:'var(--primary)'}}>{inv.id.toUpperCase()}</td>
                            <td>{inv.subject}</td>
                            <td style={{fontWeight:700}}>&#8377;{inv.total.toLocaleString('en-IN')}</td>
                            <td>{fmtDate(inv.date)}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                ) : (
                  <div className="empty-state"><h3>No invoices for this month</h3></div>
                )}
              </div>
              <div className="modal-footer">
                <button className="btn btn-outline" onClick={() => setViewReport(null)}>Close</button>
                <button className="btn btn-primary" onClick={() => addToast('PDF export coming soon', 'info')}>{Icons.download} Download PDF</button>
              </div>
            </div>
          </div>
        );
      })()}
    </div>
  );
}

function CourtLinksPage() {
  const { addToast } = useContext(AppContext);

  const iconMap = { gavel: Icons.gavel, search: Icons.search, briefcase: Icons.briefcase, users: Icons.users, shield: Icons.shield, globe: Icons.globe };

  const categories = Object.entries(COURT_RESOURCES);

  const allItems = [];
  categories.forEach(([key, cat]) => {
    cat.items.forEach(item => {
      allItems.push({ ...item, category: cat.title, catKey: key, catColor: cat.color });

  const filteredItems = searchTerm.trim()
    ? allItems.filter(item =>

function SettingsPage() {
  const { user, setUser, theme, setTheme, addToast, teamMembers, setTeamMembers } = useContext(AppContext);
  const [newMemberName, setNewMemberName] = useState('');
  const [newMemberPhone, setNewMemberPhone] = useState('');

  const handleLogout = async () => {
    // Cache profile for quick re-login (skip verification on next sign-in)
    if (user?.uid) LS.set('profile_' + user.uid, user);
    try { await AuthService.signOut(); } catch {}
    LS.remove('user');
    setUser(null);
  };

  const addMember = () => {
    if (!newMemberName.trim() || !newMemberPhone.trim()) { addToast('Enter name and WhatsApp number', 'error'); return; }
    const member = {
      id: 'tm' + Date.now(),
      name: newMemberName.trim(),
      phone: newMemberPhone.trim().replace(/[^0-9]/g, ''),
      active: true,
      addedAt: toYMD(new Date()),
    };
    setTeamMembers(prev => [...prev, member]);
    setNewMemberName('');
    setNewMemberPhone('');
    addToast(`${member.name} added to team`, 'success');
  };

  const removeMember = (id) => {
    setTeamMembers(prev => prev.filter(m => m.id !== id));
    addToast('Team member removed', 'info');
  };

  const toggleMemberActive = (id) => {
    setTeamMembers(prev => prev.map(m => m.id === id ? { ...m, active: !m.active } : m));
  };

  return (
    <div className="content">
      <div className="page-header"><h2 className="page-title">Account Settings</h2></div>
      <div className="card settings-card">
        <div className="card-body">
          <div className="profile-header">
            <div className="profile-avatar">{user?.initials || 'AD'}</div>
            <div>
              <h3 style={{fontSize:20, fontWeight:700}}>{user?.name}</h3>
              <p className="text-secondary">{user?.court}</p>
            </div>
          </div>

          <div className="form-group">
            <label className="form-label">Full Name</label>
            <input className="form-input" value={user?.name || ''} readOnly />
          </div>
          <div className="form-group">
            <label className="form-label">Bar Council Number</label>
            <input className="form-input" value={user?.barCouncil || ''} readOnly />
          </div>
          <div className="form-group">
            <label className="form-label">Advocate Roll Number</label>
            <input className="form-input" value={user?.rollNo || ''} readOnly />
          </div>
          <div className="form-group">
            <label className="form-label">Court</label>
            <input className="form-input" value={user?.court || ''} readOnly />
          </div>

          <div style={{borderTop:'1px solid var(--border)', paddingTop:20, marginTop:20}}>
            <div className="priority-row">
              <span style={{fontWeight:600}}>Dark Mode</span>
              <label className="toggle" style={{marginLeft:'auto'}}>
                <input type="checkbox" checked={theme==='dark'} onChange={()=>setTheme(theme==='dark'?'light':'dark')} />
                <div className="toggle-track" />
                <div className="toggle-thumb" />
              </label>
            </div>
          </div>

          <div style={{borderTop:'1px solid var(--border)', paddingTop:20, marginTop:20}}>
            <h3 style={{fontSize:15, fontWeight:700, marginBottom:12}}>{Icons.users} Team & WhatsApp Notifications</h3>
            <p style={{fontSize:12, color:'var(--text-secondary)', marginBottom:16}}>Add team members with their WhatsApp numbers. They'll receive case update notifications when you use "Notify Team".</p>

            <div style={{display:'flex', gap:8, marginBottom:16}}>
              <input className="form-input" placeholder="Name" value={newMemberName} onChange={e=>setNewMemberName(e.target.value)} style={{flex:1}} />
              <input className="form-input" placeholder="WhatsApp No. (e.g. 919876543210)" value={newMemberPhone} onChange={e=>setNewMemberPhone(e.target.value)} style={{flex:1}} />
              <button className="btn btn-primary btn-sm" onClick={addMember}>{Icons.plus}</button>
            </div>

            {teamMembers.length === 0 ? (
              <div style={{fontSize:12, color:'var(--text-muted)', padding:'12px 0'}}>No team members added yet</div>
            ) : (
              <div>
                {teamMembers.map(member => (
                  <div key={member.id} style={{display:'flex', alignItems:'center', gap:10, padding:'10px 12px', background:'var(--bg-input)', borderRadius:'var(--radius-sm)', marginBottom:6}}>
                    <div style={{width:32, height:32, borderRadius:'50%', background:'var(--primary-bg)', color:'var(--primary)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:12, fontWeight:700}}>
                      {member.name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)}
                    </div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13, fontWeight:600}}>{member.name}</div>
                      <div style={{fontSize:11, color:'var(--text-muted)'}}>+{member.phone}</div>
                    </div>
                    <label style={{display:'flex', alignItems:'center', gap:4, fontSize:11, color:'var(--text-secondary)'}}>
                      <input type="checkbox" checked={member.active !== false} onChange={() => toggleMemberActive(member.id)} style={{accentColor:'var(--success)'}} />

                    </label>
                    <button className="btn btn-sm btn-ghost" style={{color:'var(--danger)'}} onClick={() => removeMember(member.id)}>{Icons.trash}</button>
                  </div>
                ))}
              </div>
            )}
          </div>

          <button className="btn btn-danger btn-block" style={{marginTop:24}} onClick={handleLogout}>

        </div>
      </div>
    </div>
  );

// DEFECT CARD COMPONENT
// ─────────────────────────────────────────────────────────────────────
function DefectCard({ matter, updateMatter }) {
  const { addToast } = useContext(AppContext);
  const [showAdd, setShowAdd] = useState(false);
  const [newDefect, setNewDefect] = useState({ type: '', note: '' });
  const defects = matter.defects || [];
  const openDefects = defects.filter(d => d.status === 'open');
  const resolvedDefects = defects.filter(d => d.status === 'resolved');

  const addDefect = () => {
    if (!newDefect.type) { addToast('Select a defect type', 'error'); return; }
    const defect = {
      id: 'def' + Date.now(),
      type: newDefect.type,
      note: newDefect.note,
      status: 'open',
      flagged: false,
      createdAt: toYMD(new Date()),
    };
    updateMatter({ defects: [...defects, defect] });
    setShowAdd(false);
    setNewDefect({ type: '', note: '' });
    addToast('Defect added', 'success');
  };

  const resolveDefect = (defId) => {
    updateMatter({
      defects: defects.map(d => d.id === defId ? { ...d, status: 'resolved', resolvedAt: toYMD(new Date()) } : d)
    });
    addToast('Defect resolved', 'success');
  };

  const toggleFlag = (defId) => {
    updateMatter({
      defects: defects.map(d => d.id === defId ? { ...d, flagged: !d.flagged } : d)
    });
  };

  const removeDefect = (defId) => {
    updateMatter({ defects: defects.filter(d => d.id !== defId) });
    addToast('Defect removed', 'info');
  };

  const getDefectLabel = (typeId) => {
    const dt = DEFECT_TYPES.find(d => d.id === typeId);
    return dt ? dt.label : typeId;
  };

  const getDefectSeverity = (typeId) => {
    const dt = DEFECT_TYPES.find(d => d.id === typeId);
    return dt ? dt.severity : 'medium';
  };

  return (
    <div className="card" style={{marginTop:16}}>
      <div className="card-header">
        <span className="card-title">{Icons.alertTriangle} Defects {openDefects.length > 0 && <span className="badge badge-urgent" style={{marginLeft:6}}>{openDefects.length}</span>}</span>
        <button className="btn btn-sm btn-outline" onClick={() => setShowAdd(!showAdd)}>{Icons.plus} Add</button>
      </div>
      <div className="card-body">
        {openDefects.length === 0 && resolvedDefects.length === 0 && (
          <div style={{fontSize:12, color:'var(--text-muted)', padding:'8px 0'}}>No defects recorded</div>
        )}
        {openDefects.map(d => {
          const sev = getDefectSeverity(d.type);
          const sc = DEFECT_SEVERITY_COLORS[sev];
          return (
            <div key={d.id} className="defect-item" style={{background:sc.bg, borderLeft:`3px solid ${sc.border}`}}>
              <div className="defect-header">
                <span className="defect-label" style={{color:sc.color}}>{d.flagged && '\u{1F6A9} '}{getDefectLabel(d.type)}</span>
                <span className="defect-severity" style={{background:sc.color, color:'#fff'}}>{sev.toUpperCase()}</span>
              </div>
              {d.note && <div className="defect-note">{d.note}</div>}
              <div className="defect-actions">
                <button className="btn btn-sm btn-success" onClick={() => resolveDefect(d.id)}>Resolve</button>
                <button className="btn btn-sm btn-ghost" onClick={() => toggleFlag(d.id)}>{d.flagged ? 'Unflag' : 'Flag'}</button>
                <button className="btn btn-sm btn-ghost" style={{color:'var(--danger)'}} onClick={() => removeDefect(d.id)}>{Icons.trash}</button>
                <span style={{fontSize:11, color:'var(--text-muted)', marginLeft:'auto'}}>{fmtDate(d.createdAt)}</span>
              </div>
            </div>
          );
        })}
        {resolvedDefects.length > 0 && (
          <div style={{marginTop:12, borderTop:'1px solid var(--border-light)', paddingTop:10}}>
            <div style={{fontSize:11, fontWeight:600, color:'var(--text-muted)', marginBottom:6}}>RESOLVED ({resolvedDefects.length})</div>
            {resolvedDefects.map(d => (
              <div key={d.id} className="defect-item resolved">
                <div className="defect-header">
                  <span className="defect-label">{getDefectLabel(d.type)}</span>
                  <span className="defect-severity resolved-badge">RESOLVED</span>
                </div>
                {d.note && <div className="defect-note">{d.note}</div>}
                <div style={{fontSize:11, color:'var(--text-muted)'}}>Resolved: {fmtDate(d.resolvedAt)}</div>
              </div>
            ))}
          </div>
        )}
        {showAdd && (
          <div style={{marginTop:12, padding:12, background:'var(--bg-input)', borderRadius:'var(--radius)', border:'1px solid var(--border-light)'}}>
            <div className="form-group">
              <label className="form-label">Defect Type</label>
              <select className="form-select" value={newDefect.type} onChange={e => setNewDefect({...newDefect, type: e.target.value})}>
                <option value="">Select defect type...</option>
                {DEFECT_TYPES.map(dt => <option key={dt.id} value={dt.id}>{dt.label}</option>)}
              </select>
            </div>
            <div className="form-group">
              <label className="form-label">Note (optional)</label>
              <input className="form-input" placeholder="Additional details..." value={newDefect.note} onChange={e => setNewDefect({...newDefect, note: e.target.value})} />
            </div>
            <div style={{display:'flex', gap:8}}>
              <button className="btn btn-sm btn-primary" onClick={addDefect}>Add Defect</button>
              <button className="btn btn-sm btn-outline" onClick={() => setShowAdd(false)}>Cancel</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────
// TAGS CARD COMPONENT
// ─────────────────────────────────────────────────────────────────────
function TagsCard({ matter, updateMatter }) {
  const { addToast } = useContext(AppContext);
  const [showPicker, setShowPicker] = useState(false);
  const tags = matter.tags || [];

  const addTag = (tag) => {
    if (!tags.includes(tag)) {
      updateMatter({ tags: [...tags, tag] });
      addToast(`Tag "${tag}" added`, 'success');
    }
    setShowPicker(false);
  };

  const removeTag = (tag) => {
    updateMatter({ tags: tags.filter(t => t !== tag) });
    addToast(`Tag "${tag}" removed`, 'info');
  };

  const aiSuggest = () => {
    const suggested = suggestTags(matter.caseType, matter.judicialBranch);
    const newTags = [...new Set([...tags, ...suggested])];
    updateMatter({ tags: newTags });
    addToast(`AI suggested ${suggested.length} tags based on case type & branch`, 'success');
  };

  const availableTags = ALL_TAGS.filter(t => !tags.includes(t));

  return (
    <div className="card" style={{marginTop:16}}>
      <div className="card-header">
        <span className="card-title">{Icons.tag} Tags</span>
        <button className="btn btn-sm btn-ghost" onClick={aiSuggest} title="AI suggest tags based on case type">AI Suggest</button>
      </div>
      <div className="card-body">
        <div style={{display:'flex', flexWrap:'wrap', gap:6, marginBottom:12}}>
          {tags.length === 0 && <span style={{fontSize:12, color:'var(--text-muted)'}}>No tags yet</span>}
          {tags.map(tag => {
            const tc = TAG_COLORS[tag] || {bg:'var(--bg-hover)', color:'var(--text-secondary)'};
            return (
              <span key={tag} className="tag-pill" style={{background:tc.bg, color:tc.color}} onClick={() => removeTag(tag)} title="Click to remove">
                {tag} <span className="tag-remove">&times;</span>
              </span>
            );
          })}
        </div>
        <div className="tag-picker">
          <button className="btn btn-sm btn-outline" onClick={() => setShowPicker(!showPicker)}>{Icons.plus} Add Tag</button>
          {showPicker && (
            <div className="tag-picker-dropdown">
              {availableTags.length === 0 ? (
                <div style={{padding:8, fontSize:12, color:'var(--text-muted)'}}>All tags added</div>
              ) : availableTags.map(tag => (
                <div key={tag} className="tag-picker-item" onClick={() => addTag(tag)}>{tag}</div>
              ))}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────
// CAUSE LIST TEMPLATES PAGE
// ─────────────────────────────────────────────────────────────────────
function CauseTemplatesPage() {
  const { addToast } = useContext(AppContext);
  const [selectedTemplate, setSelectedTemplate] = useState(null);
  const [showAiBox, setShowAiBox] = useState(false);
  const [aiInput, setAiInput] = useState('');
  const [lang, setLang] = useState('en');
  const [selectedFormat, setSelectedFormat] = useState('ahc');

  const copyToClipboard = (text) => {
    navigator.clipboard.writeText(text).then(() => {
      addToast('Template copied to clipboard', 'success');
    }).catch(() => {
      addToast('Failed to copy - try manually selecting the text', 'error');
    });
  };

  const applyAi = () => {
    if (!aiInput.trim()) { addToast('Please describe the modifications', 'error'); return; }
    addToast('AI customization applied', 'success');
    setShowAiBox(false);
    setAiInput('');
  };

  const getCourtHeader = (format, language) => {
    if (language === 'hi') {
      switch (format) {
        case 'ahc': return 'इलाहाबाद उच्च न्यायालय में';
        case 'ahc_lko': return 'इलाहाबाद उच्च न्यायालय में\n(लखनऊ पीठ)';
        case 'district': return '[JUDGE_DESIGNATION] के न्यायालय में\n[DISTRICT] जिला न्यायालय, उत्तर प्रदेश';
        case 'sc': return 'भारत के सर्वोच्च न्यायालय में\nसिविल/आपराधिक अपीलीय क्षेत्राधिकार';
        default: return 'इलाहाबाद उच्च न्यायालय में';
      }
    } else {
      switch (format) {
        case 'ahc': return 'IN THE HIGH COURT OF JUDICATURE AT ALLAHABAD';
        case 'ahc_lko': return 'IN THE HIGH COURT OF JUDICATURE AT ALLAHABAD\n(LUCKNOW BENCH)';
        case 'district': return 'IN THE COURT OF [JUDGE_DESIGNATION]\n[DISTRICT] DISTRICT COURT, UTTAR PRADESH';
        case 'sc': return 'IN THE SUPREME COURT OF INDIA\nCIVIL/CRIMINAL APPELLATE JURISDICTION';
        default: return 'IN THE HIGH COURT OF JUDICATURE AT ALLAHABAD';
      }
    }
  };

  const getFormattedText = (tpl, language, format) => {
    const rawText = language === 'hi' && tpl.textHi ? tpl.textHi : tpl.text;
    const newHeader = getCourtHeader(format, language);
    if (language === 'hi') {
      return rawText.replace('इलाहाबाद उच्च न्यायालय में', newHeader);
    } else {
      return rawText.replace('IN THE HIGH COURT OF JUDICATURE AT ALLAHABAD', newHeader);
    }
  };

  const getTemplateName = (tpl) => lang === 'hi' && tpl.nameHi ? tpl.nameHi : tpl.name;

  const downloadTemplate = (text, tplName, format, language) => {
    const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${tplName.replace(/\s+/g, '_')}_${format.toUpperCase()}_${language.toUpperCase()}.txt`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    addToast('Template downloaded', 'success');
  };

  const downloadAsPdf = (text, tplName) => {
    const printWin = window.open('', '_blank');
    printWin.document.write(`<html><head><title>${tplName}</title><style>body{font-family:'Times New Roman',serif;font-size:14px;line-height:1.8;padding:40px 60px;white-space:pre-wrap;max-width:800px;margin:0 auto;}@media print{body{padding:20px 40px;}}</style></head><body>${text.replace(/\n/g,'<br>')}</body></html>`);
    printWin.document.close();
    printWin.print();
  };

  return (
    <div className="content">
      <div className="page-header">
        <h2 className="page-title">Cause List Templates</h2>
        <div style={{display:'flex', alignItems:'center', gap:12}}>
          <select className="form-select" value={selectedFormat} onChange={e => setSelectedFormat(e.target.value)} style={{width:'auto', minWidth:200}}>
            {COURT_FORMATS.map(cf => <option key={cf.id} value={cf.id}>{cf.name}</option>)}
          </select>
          <div className="lang-toggle">
            <button className={lang === 'en' ? 'active' : ''} onClick={() => setLang('en')}>English</button>
            <button className={lang === 'hi' ? 'active' : ''} onClick={() => setLang('hi')}>Hindi</button>
          </div>
        </div>
      </div>
      <div className="template-grid">
        {CAUSE_TEMPLATES.map(tpl => (
          <div key={tpl.id} className="template-card" onClick={() => setSelectedTemplate(tpl)}>
            <div style={{display:'flex', alignItems:'center', gap:10, marginBottom:10}}>
              <div style={{width:40, height:40, borderRadius:'var(--radius)', background:'var(--primary-bg)', color:'var(--primary)', display:'flex', alignItems:'center', justifyContent:'center'}}>
                {Icons.fileText}
              </div>
            </div>
            <h4>{tpl.name}</h4>
            {tpl.nameHi && <div style={{fontSize:13, color:'var(--text-secondary)', marginBottom:4}}>{tpl.nameHi}</div>}
            <p>{tpl.desc}</p>
            <button className="btn btn-sm btn-primary" onClick={(e) => { e.stopPropagation(); setSelectedTemplate(tpl); }}>Use Template</button>
          </div>
        ))}
      </div>

      {selectedTemplate && (
        <div className="modal-overlay" onClick={() => { setSelectedTemplate(null); setShowAiBox(false); }}>
          <div className="modal" style={{width:700, maxHeight:'90vh'}} onClick={e => e.stopPropagation()}>
            <div className="modal-header">
              <div>
                <span className="modal-title">{selectedTemplate.name}</span>
                {selectedTemplate.nameHi && <div style={{fontSize:13, color:'var(--text-secondary)'}}>{selectedTemplate.nameHi}</div>}
              </div>
              <div style={{display:'flex', alignItems:'center', gap:10}}>
                <select className="form-select" value={selectedFormat} onChange={e => setSelectedFormat(e.target.value)} style={{width:'auto', minWidth:160, fontSize:12}}>
                  {COURT_FORMATS.map(cf => <option key={cf.id} value={cf.id}>{cf.name}</option>)}
                </select>
                <div className="lang-toggle">
                  <button className={lang === 'en' ? 'active' : ''} onClick={() => setLang('en')}>EN</button>
                  <button className={lang === 'hi' ? 'active' : ''} onClick={() => setLang('hi')}>HI</button>
                </div>
                <button className="modal-close" onClick={() => { setSelectedTemplate(null); setShowAiBox(false); }}>{Icons.x}</button>
              </div>
            </div>
            <div className="modal-body">
              <pre style={{whiteSpace:'pre-wrap', fontFamily:'var(--font)', fontSize:13, lineHeight:1.7, background:'var(--bg-input)', padding:16, borderRadius:'var(--radius)', border:'1px solid var(--border-light)', maxHeight:400, overflowY:'auto'}}>
                {getFormattedText(selectedTemplate, lang, selectedFormat)}
              </pre>
              {showAiBox && (
                <div style={{marginTop:16}}>
                  <label className="form-label">Describe your modifications</label>
                  <textarea className="form-input" rows={3} placeholder="e.g. Change the prayer section to include specific relief..." value={aiInput} onChange={e => setAiInput(e.target.value)} />
                  <button className="btn btn-sm btn-primary mt-8" onClick={applyAi}>Apply AI Changes</button>
                </div>
              )}
            </div>
            <div className="modal-footer">
              <button className="btn btn-outline" onClick={() => setShowAiBox(!showAiBox)}>{Icons.edit} Customize with AI</button>
              <button className="btn btn-outline" onClick={() => downloadTemplate(getFormattedText(selectedTemplate, lang, selectedFormat), selectedTemplate.name, selectedFormat, lang)}>{Icons.download} Download TXT</button>
              <button className="btn btn-outline" onClick={() => downloadAsPdf(getFormattedText(selectedTemplate, lang, selectedFormat), selectedTemplate.name)}>{Icons.fileText} Download as PDF</button>
              <button className="btn btn-primary" onClick={() => copyToClipboard(getFormattedText(selectedTemplate, lang, selectedFormat))}>{Icons.copy} Copy to Clipboard</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}
